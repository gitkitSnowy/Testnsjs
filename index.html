<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Mobile Elite</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #0b0e16;
            --panel: #161a26;
            --accent: #2481cc;
            --gold: #f1b90d;
            --white: #ffffff;
            --sub: #8e8e93;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* Базовые настройки для телефона */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            color: var(--white);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; /* Запрещаем скролл всего экрана */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px; /* Ограничение для широких экранов */
            margin: 0 auto;
            position: relative;
        }

        /* HEADER */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .user-meta { display: flex; align-items: center; gap: 10px; }
        .avatar { 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            border: 2px solid var(--accent);
            background: #222;
            object-fit: cover;
        }

        .balance-pill {
            background: rgba(36, 129, 204, 0.1);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            color: var(--gold);
            font-size: 14px;
        }

        /* MAIN CONTENT AREA */
        main {
            flex: 1;
            overflow-y: auto; /* Скролл только внутри контента */
            padding: 20px;
            padding-bottom: 100px; /* Место под навигацию */
            -webkit-overflow-scrolling: touch;
        }

        .screen { display: none; width: 100%; animation: slide 0.2s ease-out; }
        .screen.active { display: block; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }

        /* WHEEL SECTION */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1/1;
            margin: 0 auto 30px;
        }

        #canvasWheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.1, 0, 0, 1);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .wheel-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: #000; border-radius: 50%;
            border: 3px solid var(--panel);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; z-index: 5;
        }

        /* PLAYERS LIST */
        .player-card {
            background: var(--panel);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .chance-tag {
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-left: 10px;
        }

        /* CONTROLS */
        .bottom-controls {
            padding: 15px;
            background: var(--panel);
            border-radius: 20px 20px 0 0;
            margin-top: 20px;
        }

        .btn-bet {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(36, 129, 204, 0.4);
        }

        /* NAVIGATION BAR */
        nav {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 500px;
            background: rgba(22, 26, 38, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            color: var(--sub);
            font-size: 10px;
            display: flex; flex-direction: column; align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; font-style: normal; }

        /* ADMIN MODAL */
        .admin-overlay {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 1000;
            padding: 30px;
            display: none;
            overflow-y: auto;
        }

        /* SUPPORT CHAT STYLE */
        .chat-box { height: 300px; display: flex; flex-direction: column; }
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg.me { background: var(--accent); align-self: flex-end; }
        .msg.them { background: #222; align-self: flex-start; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="user-meta">
                <img id="hdr-avatar" class="avatar" src="">
                <div style="line-height: 1.1;">
                    <div id="hdr-nick" style="font-weight: 800; font-size: 14px;">@Guest</div>
                    <div id="hdr-status" style="font-size: 9px; color: var(--accent);">PLAYER</div>
                </div>
            </div>
            <div class="balance-pill"><span id="hdr-bal">0.00</span> TON</div>
        </header>

        <main id="content">
            <div id="scr-game" class="screen active">
                <div class="wheel-wrapper">
                    <canvas id="canvasWheel" width="600" height="600"></canvas>
                    <div class="wheel-center">WINNER</div>
                    <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); color:white; font-size:20px;">▼</div>
                </div>

                <div id="game-status" style="text-align: center; font-weight: 800; color: var(--gold); margin-bottom: 15px; font-size: 13px;">
                    ОЖИДАНИЕ СТАВОК...
                </div>

                <div id="players-list">
                    </div>

                <div class="bottom-controls">
                    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                        <input type="number" id="bet-amt" style="flex:1; background:#000; border:1px solid #333; color:white; border-radius:10px; padding:12px; text-align:center; font-weight:bold;" value="1.0">
                    </div>
                    <button class="btn-bet" onclick="handleBet()">СДЕЛАТЬ СТАВКУ</button>
                </div>
            </div>

            <div id="scr-profile" class="screen">
                <div style="text-align: center; padding: 20px 0;">
                    <div style="position: relative; display: inline-block;">
                        <img id="prof-avatar" class="avatar" style="width: 90px; height: 90px;">
                        <div id="v-mark" style="position:absolute; bottom:0; right:0; background:var(--accent); border-radius:50%; width:24px; height:24px; display:none; border:3px solid var(--bg);">✓</div>
                    </div>
                    <h2 id="prof-nick">@User</h2>
                    
                    <div id="ton-connect-btn" style="margin-bottom: 20px;"></div>

                    <div style="background:var(--panel); padding:15px; border-radius:15px; text-align:left; margin-bottom:10px;">
                        <div style="font-size:11px; color:var(--sub);">ВАША ИСТОРИЯ</div>
                        <div style="font-size:14px; margin-top:5px;">Игр: 0 | Побед: 0</div>
                    </div>

                    <button class="btn-bet" style="background:#222; margin-top:10px;" onclick="nav('support')">ТЕХ. ПОДДЕРЖКА</button>
                    <button id="adm-btn" class="btn-bet" style="background:var(--gold); color:#000; margin-top:10px; display:none;" onclick="showAdmin()">АДМИН ПАНЕЛЬ</button>
                </div>
            </div>

            <div id="scr-support" class="screen">
                <h3>Поддержка</h3>
                <div class="msg-list" id="chat-msgs">
                    <div class="msg them">Привет! Опиши свою проблему.</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <input type="text" id="chat-input" style="flex:1; background:#000; border:1px solid #333; color:white; border-radius:10px; padding:12px;">
                    <button class="btn-bet" style="width:60px;" onclick="sendChat()">➡</button>
                </div>
                <button class="btn-bet" style="background:transparent; margin-top:20px;" onclick="nav('profile')">Назад</button>
            </div>
        </main>

        <nav>
            <a href="#" class="nav-item active" onclick="nav('game')"><i>🎲</i>Rolls</a>
            <a href="#" class="nav-item" onclick="nav('profile')"><i>👤</i>Профиль</a>
        </nav>
    </div>

    <div id="admin-panel" class="admin-overlay">
        <h2 style="color:var(--gold)">Admin Menu</h2>
        <div style="background:var(--panel); padding:15px; border-radius:15px;">
            <input type="text" id="adm-user" placeholder="@username" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#000; color:white;">
            <input type="number" id="adm-sum" placeholder="TON" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; background:#000; color:white;">
            <button class="btn-bet" onclick="adminAction('gift')">Выдать TON</button>
            <button class="btn-bet" style="margin-top:10px; background:#2ecc71;" onclick="adminAction('v')">Дать Верификацию</button>
            <button class="btn-bet" style="margin-top:10px; background:#9b59b6;" onclick="adminAction('adm')">Дать Админку</button>
        </div>
        <button class="btn-bet" style="margin-top:30px; background:#e74c3c;" onclick="document.getElementById('admin-panel').style.display='none'">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const tonConnect = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/master/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        let user = { nick: "Guest", bal: 0.0, role: "player" };
        let gameActive = false;
        let players = [];

        function init() {
            tg.ready();
            tg.expand();

            const tgData = tg.initDataUnsafe?.user;
            
            // Если мы не в Телеграм - показываем ошибку
            if (!tgData && location.hostname !== "localhost") {
                document.body.innerHTML = "<div style='text-align:center; padding-top:100px;'><h2>Ошибка доступа</h2><p>Запустите приложение в Telegram</p></div>";
                return;
            }

            user.nick = tgData?.username || "Kegovich";
            const photo = tgData?.photo_url || `https://api.dicebear.com/7.x/initials/svg?seed=${user.nick}`;
            
            document.getElementById('hdr-nick').innerText = "@" + user.nick;
            document.getElementById('prof-nick').innerText = "@" + user.nick;
            document.getElementById('hdr-avatar').src = photo;
            document.getElementById('prof-avatar').src = photo;

            if (user.nick === "Kegovich") {
                user.role = "owner";
                document.getElementById('adm-btn').style.display = 'block';
                document.getElementById('hdr-status').innerText = "OWNER";
                document.getElementById('v-mark').style.display = 'block';
            }

            drawWheel();
            updateUI();
        }

        // --- NAVIGATION ---
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        }

        // --- GAME ---
        const ctx = document.getElementById('canvasWheel').getContext('2d');
        function drawWheel() {
            ctx.clearRect(0,0,600,600);
            const total = players.reduce((s,p) => s+p.bet, 0);
            
            if(players.length === 0) {
                ctx.beginPath(); ctx.fillStyle = "#1c2130";
                ctx.arc(300,300,280,0,7); ctx.fill();
                return;
            }

            let start = 0;
            players.forEach(p => {
                const slice = (p.bet/total)*2*Math.PI;
                ctx.beginPath(); ctx.fillStyle = p.color;
                ctx.moveTo(300,300);
                ctx.arc(300,300,280, start, start+slice);
                ctx.fill();
                start += slice;
            });
        }

        function handleBet() {
            const amt = parseFloat(document.getElementById('bet-amt').value);
            if(user.bal < amt) return tg.showAlert("Недостаточно TON!");

            tg.HapticFeedback.impactOccurred('heavy');
            user.bal -= amt;
            players.push({
                name: "@"+user.nick, bet: amt, color: "#2481cc", 
                avatar: document.getElementById('hdr-avatar').src
            });
            updateUI();
            updatePlayersUI();
            if(players.length === 2) startTimer();
        }

        function startTimer() {
            let s = 10;
            const iv = setInterval(() => {
                s--;
                document.getElementById('game-status').innerText = `СТАРТ ЧЕРЕЗ ${s} СЕК...`;
                if(s <= 0) { clearInterval(iv); spin(); }
            }, 1000);
        }

        function spin() {
            gameActive = true;
            const deg = Math.floor(Math.random()*360) + 3000;
            document.getElementById('canvasWheel').style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                const winner = players[Math.floor(Math.random()*players.length)];
                const total = players.reduce((s,p)=>s+p.bet, 0);
                tg.showAlert(`Победил ${winner.name}! Куш: ${total} TON`);
                if(winner.name.includes(user.nick)) user.bal += total;
                reset();
            }, 6500);
        }

        function reset() {
            players = [];
            gameActive = false;
            document.getElementById('canvasWheel').style.transform = `rotate(0deg)`;
            document.getElementById('game-status').innerText = "ОЖИДАНИЕ СТАВОК...";
            updatePlayersUI();
            updateUI();
        }

        function updatePlayersUI() {
            drawWheel();
            const list = document.getElementById('players-list');
            const total = players.reduce((s,p)=>s+p.bet, 0);
            list.innerHTML = players.map(p => `
                <div class="player-card">
                    <img src="${p.avatar}" class="avatar" style="width:25px; height:25px;">
                    <div style="flex:1; margin-left:10px; font-weight:bold; font-size:13px;">${p.name}</div>
                    <div class="chance-tag">${((p.bet/total)*100).toFixed(0)}%</div>
                    <div style="margin-left:15px; font-weight:900;">${p.bet} <span style="color:var(--accent)">T</span></div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('hdr-bal').innerText = user.bal.toFixed(2);
            document.getElementById('p-balance').innerText = user.bal.toFixed(2);
        }

        // --- SUPPORT ---
        function sendChat() {
            const val = document.getElementById('chat-input').value;
            if(!val) return;
            document.getElementById('chat-msgs').innerHTML += `<div class="msg me">${val}</div>`;
            document.getElementById('chat-input').value = "";
            setTimeout(() => {
                document.getElementById('chat-msgs').innerHTML += `<div class="msg them">Ваш вопрос передан администратору @Kegovich.</div>`;
            }, 1000);
        }

        // --- ADMIN ---
        function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function adminAction(type) {
            const target = document.getElementById('adm-user').value;
            const sum = parseFloat(document.getElementById('adm-sum').value);
            if(type === 'gift' && target.includes(user.nick)) {
                user.bal += sum; updateUI(); alert("Выдано!");
            }
            if(type === 'v' && target.includes(user.nick)) {
                document.getElementById('v-mark').style.display = 'block'; alert("Галочка дана!");
            }
        }

        init();

        // Боты
        setInterval(() => {
            if(players.length > 0 && players.length < 3 && !gameActive && Math.random() > 0.7) {
                players.push({
                    name: "@Bot_"+Math.floor(Math.random()*100),
                    bet: Math.floor(Math.random()*5)+1,
                    color: "#e74c3c",
                    avatar: "https://api.dicebear.com/7.x/bottts/svg?seed="+Math.random()
                });
                updatePlayersUI();
            }
        }, 10000);

    </script>
</body>
</html>
