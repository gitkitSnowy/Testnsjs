<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP ELITE v12</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600;800&display=swap');

        :root {
            --bg: #000000;
            --card: #0a0a0c;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.5);
            --gold: #ffb400;
            --red: #ff3b30;
            --green: #34c759;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        /* BACKGROUND DECOR */
        .bg-glow {
            position: fixed; width: 300px; height: 300px; background: var(--accent);
            filter: blur(150px); opacity: 0.15; top: -100px; left: -100px; z-index: -1;
        }

        .app-shell { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* HEADER */
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .u-card { display: flex; align-items: center; gap: 15px; }
        .u-av { width: 50px; height: 50px; border-radius: 15px; border: 1px solid var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .lvl-pill { background: var(--accent); font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }
        
        .bal-box { text-align: right; }
        .bal-val { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 20px; font-weight: 900; }

        /* MAIN NAVIGATION */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* CARDS */
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 100%); }

        /* GAMES */
        .tower-grid { display: grid; grid-template-rows: repeat(8, 1fr); gap: 10px; flex-direction: column-reverse; }
        .t-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; opacity: 0.2; }
        .t-row.active { opacity: 1; }
        .t-tile { height: 55px; background: #161618; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .t-tile.win { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green); }
        .t-tile.lose { background: var(--red); box-shadow: 0 0 20px var(--red); }

        .roll-wheel { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 10px solid #161618; position: relative; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--accent); z-index: 10; }

        /* CHAT */
        .chat-area { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #050505; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; font-size: 14px; max-width: 85%; }
        .msg.me { align-self: flex-end; background: var(--accent); }
        .msg.other { align-self: flex-start; background: #1c1c1e; }
        .msg-u { font-size: 10px; font-weight: 800; color: var(--gold); margin-bottom: 3px; display: block; }

        /* XP BAR */
        .xp-bg { width: 100%; height: 8px; background: #161618; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid var(--border); }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #00c6ff); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* BUTTONS */
        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .btn-blue { background: var(--accent); color: #fff; box-shadow: 0 5px 20px var(--accent-glow); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn:active { transform: translateY(2px) scale(0.98); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* TAB BAR */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            display: flex; justify-content: space-around; padding: 15px 0 35px;
            border-top: 1px solid var(--border);
        }
        .n-item { color: #444; text-align: center; font-weight: 900; font-size: 11px; }
        .n-item.active { color: var(--accent); }
        .n-item i { font-size: 24px; display: block; font-style: normal; margin-bottom: 5px; }

        /* ADMIN PANEL */
        #admin-panel {
            position: fixed; inset: 0; background: #000; z-index: 10000; display: none; padding: 25px;
            overflow-y: auto;
        }
        .adm-card { background: #0a0a0a; border: 1px solid var(--red); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .adm-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app-shell">
    <header>
        <div class="u-card">
            <img id="u-av" class="u-av" src="">
            <div>
                <div id="u-name" style="font-weight: 800; font-size: 16px;">Alexander</div>
                <div class="lvl-pill">LVL <span id="u-lvl">1</span></div>
            </div>
        </div>
        <div class="bal-box">
            <div style="font-size: 9px; color: #666; letter-spacing: 2px;">WALLET</div>
            <div class="bal-val"><span id="u-bal">0.00</span> <span style="font-size:12px">TON</span></div>
        </div>
    </header>

    <div style="padding: 0 20px;"><div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div></div>

    <main>
        <div id="scr-lobby" class="screen active">
            <div class="card" onclick="app.nav('game-roll')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>⚔️ PvP ROLL</h2>
                    <span style="color:var(--green); font-weight:900;">LIVE</span>
                </div>
                <p style="color:#666; font-size:13px;">Общий банк: <span id="lobby-roll-bank" style="color:var(--gold);">0.00</span> TON</p>
                <button class="btn btn-blue" style="margin-top:15px;">ВОЙТИ В АРЕНУ</button>
            </div>
            <div class="card" onclick="app.nav('game-tower')">
                <h2>🏰 CYBER TOWER</h2>
                <p style="color:#666; font-size:13px;">Шанс выиграть x100 за 8 шагов.</p>
                <button class="btn btn-outline" style="margin-top:15px;">ПОДНЯТЬСЯ</button>
            </div>
        </div>

        <div id="scr-game-roll" class="screen">
            <div class="card" style="text-align:center;">
                <div class="wheel-pointer"></div>
                <div class="roll-wheel" id="wheel-obj">
                    <div id="wheel-timer" style="font-family:'Orbitron'; font-size:40px; font-weight:900;">15</div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span>БАНК: <b id="r-bank" style="color:var(--gold);">0.00</b></span>
                    <span>ИГРОКОВ: <b id="r-players">0</b></span>
                </div>
                <input type="number" id="r-bet" class="adm-input" value="1.0" style="text-align:center;">
                <button class="btn btn-blue" onclick="roll.bet()">ПОСТАВИТЬ</button>
            </div>
        </div>

        <div id="scr-game-tower" class="screen">
            <div class="card">
                <div class="tower-grid" id="t-grid"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                    <button id="t-start" class="btn btn-blue" onclick="tower.start()">СТАВКА 5</button>
                    <button id="t-cash" class="btn btn-blue" style="background:var(--gold); color:000; display:none;" onclick="tower.cashout()">CASH</button>
                </div>
            </div>
        </div>

        <div id="scr-profile" class="screen">
            <div class="card" style="text-align:center;">
                <h3 id="p-name">Alexander</h3>
                <div style="display:flex; justify-content:space-around; margin-top:10px;">
                    <div><span id="p-xp-cur">0</span><br><small>XP</small></div>
                    <div><span id="p-wins">0</span><br><small>ПОБЕД</small></div>
                </div>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn btn-outline" onclick="chat.switch('global')" style="flex:1; padding:10px;">CHAT</button>
                <button class="btn btn-outline" onclick="chat.switch('support')" style="flex:1; padding:10px;">SUPPORT</button>
            </div>

            <div class="chat-area" id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-in" class="adm-input" style="margin:0;" placeholder="Сообщение...">
                <button class="btn btn-blue" style="width:70px; padding:0;" onclick="chat.send()">></button>
            </div>

            <button id="adm-trigger" class="btn btn-outline" style="margin-top:20px; color:var(--red); border-color:var(--red); display:none;" onclick="admin.show()">ADMIN CP</button>
        </div>
    </main>

    <nav>
        <div class="n-item active" onclick="app.nav('lobby')"><i>🏠</i>LOBBY</div>
        <div class="n-item" onclick="app.nav('game-roll')"><i>⚔️</i>ROLL</div>
        <div class="n-item" onclick="app.nav('game-tower')"><i>🏰</i>TOWER</div>
        <div class="n-item" onclick="app.nav('profile')"><i>👤</i>PROFILE</div>
    </nav>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="color:var(--red); font-family:'Orbitron';">ELITE ADM</h1>
        <button class="btn btn-outline" style="width:auto; padding:10px 20px;" onclick="admin.hide()">CLOSE</button>
    </div>
    
    <div class="adm-card">
        <h3>USER STATS</h3>
        <label>BALANCE</label><input type="number" id="adm-bal" class="adm-input">
        <label>LEVEL</label><input type="number" id="adm-lvl" class="adm-input">
        <label>XP</label><input type="number" id="adm-xp" class="adm-input">
        <button class="btn btn-blue" onclick="admin.save()">SAVE CHANGES</button>
    </div>

    <div class="adm-card">
        <h3>GAME RIGGING</h3>
        <label>TOWER WIN CHANCE (%)</label>
        <input type="range" id="adm-chance" min="0" max="100" value="45" style="width:100%;">
        <p id="chance-val">45%</p>
    </div>

    <div class="adm-card">
        <h3>SUPPORT TICKETS</h3>
        <div id="adm-tickets"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = {
        u: { name: "Player", bal: 500, lvl: 1, xp: 0, wins: 0, av: "" },
        roll: { bank: 0, players: 0, timer: 15, active: false },
        tower: { active: false, floor: 0, chance: 45 },
        chat: { mode: 'global', global: [], support: [] }
    };

    const app = {
        nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-'+id).classList.add('active');
            document.querySelectorAll('.n-item').forEach(i => i.classList.remove('active'));
            // logic for active icon
            this.sync();
            if(id === 'game-tower') tower.init();
            if(id === 'game-roll') roll.init();
        },
        sync() {
            document.getElementById('u-bal').innerText = db.u.bal.toFixed(2);
            document.getElementById('u-name').innerText = db.u.name;
            document.getElementById('u-lvl').innerText = db.u.lvl;
            document.getElementById('p-name').innerText = db.u.name;
            document.getElementById('p-xp-cur').innerText = db.u.xp;
            document.getElementById('p-wins').innerText = db.u.wins;
            
            const nextXp = db.u.lvl * 1000;
            document.getElementById('xp-fill').style.width = (db.u.xp / nextXp * 100) + '%';
            if(db.u.av) document.getElementById('u-av').src = db.u.av;
        }
    };

    const tower = {
        init() {
            const g = document.getElementById('t-grid');
            g.innerHTML = '';
            for(let i=7; i>=0; i--) {
                const row = document.createElement('div');
                row.className = 't-row';
                row.id = 't-row-'+i;
                row.innerHTML = `<div class="t-tile" onclick="tower.step(${i},0)">?</div><div class="t-tile" onclick="tower.step(${i},1)">?</div><div class="t-tile" onclick="tower.step(${i},2)">?</div>`;
                g.appendChild(row);
            }
        },
        start() {
            if(db.u.bal < 5) return tg.showAlert("Low Balance");
            db.u.bal -= 5;
            db.tower.active = true;
            db.tower.floor = 0;
            document.getElementById('t-start').style.display = 'none';
            document.getElementById('t-cash').style.display = 'block';
            this.draw();
            app.sync();
        },
        draw() {
            document.querySelectorAll('.t-row').forEach(r => r.classList.remove('active'));
            document.getElementById('t-row-'+db.tower.floor).classList.add('active');
        },
        step(f, t) {
            if(!db.tower.active || f !== db.tower.floor) return;
            const win = (Math.random() * 100) < db.tower.chance;
            const tiles = document.getElementById('t-row-'+f).children;
            if(win) {
                tiles[t].classList.add('win');
                db.tower.floor++;
                db.u.xp += 40;
                if(db.tower.floor > 7) this.cashout();
                else this.draw();
            } else {
                tiles[t].classList.add('lose');
                db.tower.active = false;
                setTimeout(() => { this.init(); document.getElementById('t-start').style.display='block'; document.getElementById('t-cash').style.display='none'; }, 1000);
            }
            app.sync();
        },
        cashout() {
            const mult = [1.2, 2, 4, 8, 15, 30, 60, 150];
            const prize = 5 * mult[db.tower.floor-1];
            db.u.bal += prize;
            db.u.wins++;
            tg.showConfirm(`Выигрыш: ${prize} TON!`);
            db.tower.active = false;
            this.init();
            document.getElementById('t-start').style.display='block';
            document.getElementById('t-cash').style.display='none';
            app.sync();
        }
    };

    const roll = {
        init() {
            if(db.roll.active) return;
            db.roll.active = true;
            this.tick();
        },
        tick() {
            const timerObj = document.getElementById('wheel-timer');
            const itv = setInterval(() => {
                db.roll.timer--;
                timerObj.innerText = db.roll.timer;
                if(db.roll.timer <= 0) {
                    clearInterval(itv);
                    this.spin();
                }
            }, 1000);
        },
        bet() {
            const val = parseFloat(document.getElementById('r-bet').value);
            if(db.u.bal >= val) {
                db.u.bal -= val;
                db.roll.bank += val;
                db.roll.players++;
                document.getElementById('r-bank').innerText = db.roll.bank.toFixed(2);
                document.getElementById('r-players').innerText = db.roll.players;
                app.sync();
            }
        },
        spin() {
            const wheel = document.getElementById('wheel-obj');
            const deg = Math.floor(3600 + Math.random() * 3600);
            wheel.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
            wheel.style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                if(db.roll.bank > 0) tg.showAlert("Победил: " + db.u.name);
                db.roll.timer = 15;
                db.roll.bank = 0;
                db.roll.players = 0;
                wheel.style.transition = "none";
                wheel.style.transform = `rotate(0deg)`;
                this.tick();
            }, 5000);
        }
    };

    const chat = {
        switch(m) { db.chat.mode = m; this.render(); },
        send() {
            const input = document.getElementById('chat-in');
            if(!input.value) return;
            const msg = { u: db.u.name, t: input.value };
            if(db.chat.mode === 'global') db.chat.global.push(msg);
            else { db.chat.support.push(msg); admin.updateSupport(); }
            input.value = '';
            this.render();
        },
        render() {
            const box = document.getElementById('chat-box');
            const msgs = db.chat.mode === 'global' ? db.chat.global : db.chat.support;
            box.innerHTML = msgs.map(m => `
                <div class="msg ${m.u === db.u.name ? 'me' : 'other'}">
                    <span class="msg-u">${m.u}</span>${m.t}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }
    };

    const admin = {
        show() { 
            document.getElementById('admin-panel').style.display = 'block'; 
            document.getElementById('adm-bal').value = db.u.bal;
            document.getElementById('adm-lvl').value = db.u.lvl;
            document.getElementById('adm-xp').value = db.u.xp;
        },
        hide() { document.getElementById('admin-panel').style.display = 'none'; },
        save() {
            db.u.bal = parseFloat(document.getElementById('adm-bal').value);
            db.u.lvl = parseInt(document.getElementById('adm-lvl').value);
            db.u.xp = parseInt(document.getElementById('adm-xp').value);
            app.sync();
            tg.showAlert("Data updated");
        },
        updateSupport() {
            const cont = document.getElementById('adm-tickets');
            cont.innerHTML = db.chat.support.map(m => `<div class="msg other"><small>${m.u}</small><br>${m.t}</div>`).join('');
        }
    };

    document.getElementById('adm-chance').oninput = function() {
        db.tower.chance = this.value;
        document.getElementById('chance-val').innerText = this.value + '%';
    };

    window.onload = () => {
        tg.ready(); tg.expand();
        if(tg.initDataUnsafe?.user) {
            const u = tg.initDataUnsafe.user;
            db.u.name = u.first_name;
            db.u.av = u.photo_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${u.id}`;
            if(u.id === 6418873752 || u.username === 'Kegovich') {
                document.getElementById('adm-trigger').style.display = 'block';
            }
        }
        app.sync();
    };
</script>

</body>
</html>
