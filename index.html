<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Индикатор загрузки */
        .loader {
            width: 50px;
            height: 5px;
            background: #334155;
            margin: 30px auto 0;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
        }

        .loader-line {
            position: absolute;
            width: 40%;
            height: 100%;
            background: #38bdf8;
            animation: slide 1.5s infinite ease-in-out;
        }

        @keyframes slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚙️</div>
        <h1>Идут технические работы</h1>
        <p>Пожалуйста, ожидайте. Мы скоро вернемся.</p>
        
        <div class="loader">
            <div class="loader-line"></div>
        </div>
    </div>

</body>
</html>
