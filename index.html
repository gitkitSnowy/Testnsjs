<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP FULL AUTO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #05070a; --panel: rgba(20, 24, 40, 0.9); --accent: #2481cc;
            --gold: #ffcc00; --red: #ff4757; --green: #2ed573; --text: #ffffff;
            --sub: #a0a0ab;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

        /* HEADER */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .u-avatar { width: 42px; height: 42px; border-radius: 12px; border: 2px solid var(--accent); }
        .balance-container {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 16px; border: 1px solid var(--accent);
        }

        /* SCREENS */
        main { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .card { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }

        .btn-action {
            background: linear-gradient(135deg, #2481cc 0%, #00d2ff 100%); border: none; color: white; 
            padding: 16px; border-radius: 16px; width: 100%; font-weight: 800; cursor: pointer;
        }

        .input-fld {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 14px; border-radius: 14px; margin-bottom: 12px;
        }

        /* КОЛЕСО */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 25px auto; }
        canvas#mainWheel { width: 100%; height: 100%; transition: 6s cubic-bezier(0.1, 0, 0, 1); }

        /* НАВИГАЦИЯ */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: rgba(20, 24, 40, 0.95); display: flex; justify-content: space-around; 
            padding: 15px 0 25px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn { color: var(--sub); text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--accent); font-weight: bold; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 25px; display: none; overflow-y: auto; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="my-avatar" class="u-avatar" src="">
            <div>
                <div style="font-weight:900; display:flex; align-items:center; gap:3px;">
                    <span id="my-name">@User</span><span id="verif-icon" style="color:#00c3ff; display:none;">💎</span>
                </div>
                <div id="my-rank" style="font-size:9px; color:var(--accent); font-weight:bold;">USER</div>
            </div>
        </div>
        <div class="balance-container">
            <span id="my-bal" style="font-weight:900; color:var(--gold); font-size:18px;">0.00</span> <small>TON</small>
        </div>
    </header>

    <main>
        <div id="scr-lobby" class="screen active">
            <h2 style="margin-bottom:15px;">Арена</h2>
            <div class="card" style="border-left: 4px solid var(--gold);" onclick="joinRoom(0)">
                <b>ОБЩИЙ ЗАЛ</b><br><small>Ставки от 0.1 TON</small>
            </div>
            <div id="rooms-list"></div>
        </div>

        <div id="scr-profile" class="screen">
            <div class="card" style="text-align:center;">
                <img id="prof-img" class="u-avatar" style="width:80px; height:80px; border-radius:20px; margin-bottom:10px;">
                <h3 id="prof-name">@User</h3>
                <div id="ton-connect-button" style="display:flex; justify-content:center; margin-top:15px;"></div>
            </div>

            <div class="card" style="border: 2px solid var(--accent); background: rgba(36,129,204,0.05);">
                <h4 style="margin:0 0 10px; color:var(--accent);">⚡ АВТО-ПОПОЛНЕНИЕ</h4>
                <p style="font-size:12px; color:var(--sub); margin-bottom:15px;">Выбери сумму, нажми кнопку и подтверди в кошельке. Баланс обновится сам.</p>
                
                <input type="number" id="pay-amount" class="input-fld" placeholder="Сумма TON" value="1.0" step="0.1">
                <button id="pay-btn" class="btn-action" onclick="autoPay()">КУПИТЬ TON</button>
            </div>

            <div class="card">
                <h4>🎟️ ПРОМОКОД</h4>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="promo-input" class="input-fld" style="margin:0;" placeholder="Введите код...">
                    <button class="btn-action" style="width:auto; padding:0 20px;" onclick="activatePromo()">ОК</button>
                </div>
            </div>

            <button id="adm-btn" class="btn-action" style="background:var(--gold); color:black; display:none; margin-top:10px;" onclick="openAdmin()">АДМИН ПАНЕЛЬ</button>
        </div>

        <div id="scr-game" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="leaveRoom()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
                <h3 id="game-title" style="margin:0;">ЗАЛ</h3>
                <div style="width:24px;"></div>
            </div>
            <div id="game-status" style="text-align:center; color:var(--gold); font-weight:bold; margin:15px 0;">ОЖИДАНИЕ...</div>
            <div class="wheel-box">
                <canvas id="mainWheel" width="600" height="600"></canvas>
            </div>
            <div id="game-players" class="card" style="min-height:60px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="play-bet" class="input-fld" style="flex:1; margin:0;" value="1.0">
                <button class="btn-action" style="flex:2;" onclick="placeBet()">СТАВКА</button>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="nav('lobby')">🎮 ИГРЫ</div>
        <div class="nav-btn" onclick="nav('profile')">💎 АККАУНТ</div>
    </nav>
</div>

<div id="modal-admin" class="modal">
    <h2>ADMIN PANEL</h2>
    <div class="card">
        <h4>Выдать TON</h4>
        <input id="adm-target-user" class="input-fld" placeholder="@username">
        <input id="adm-amount" type="number" class="input-fld" placeholder="Сумма">
        <button class="btn-action" style="background:var(--green);" onclick="adminAddBal()">ВЫДАТЬ</button>
    </div>
    <button class="btn-action" style="background:var(--red); margin-top:20px;" onclick="document.getElementById('modal-admin').style.display='none'">ЗАКРЫТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // ЗАМЕНИ НА СВОЙ АДРЕС
    const MY_WALLET = "UQAr_YOUR_REAL_WALLET_HERE"; 

    // Инициализация той самой модалки TON Connect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/master/public/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    let savedBal = localStorage.getItem('ton_balance_final');
    let user = { 
        name: "Guest", 
        bal: savedBal ? parseFloat(savedBal) : 0.00, 
        role: "user", 
        verif: false 
    };

    let rooms = []; let promos = []; let gamePlayers = []; let timerIv = null;

    function init() {
        tg.ready(); tg.expand();
        const data = tg.initDataUnsafe?.user;
        user.name = data?.username || "Kegovich";
        
        document.getElementById('my-name').innerText = "@" + user.name;
        document.getElementById('prof-name').innerText = "@" + user.name;
        document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${user.name}`;
        document.getElementById('prof-img').src = `https://api.dicebear.com/7.x/initials/svg?seed=${user.name}`;

        if(user.name === "Kegovich" || user.name === "mas1sa") {
            user.role = "owner"; user.verif = true;
            document.getElementById('adm-btn').style.display = 'block';
        }
        if(user.verif) document.getElementById('verif-icon').style.display = 'inline';

        save(); drawWheel();
    }

    function save() {
        localStorage.setItem('ton_balance_final', user.bal.toFixed(2));
        document.getElementById('my-bal').innerText = user.bal.toFixed(2);
    }

    // ТА САМАЯ АВТОМАТИЧЕСКАЯ ОПЛАТА
    async function autoPay() {
        // Если кошелек не подключен — окно само предложит его выбрать
        if (!tonConnectUI.connected) {
            await tonConnectUI.openModal();
            return;
        }

        const amount = document.getElementById('pay-amount').value;
        const nanoAmount = (parseFloat(amount) * 1000000000).toString();

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{ address: MY_WALLET, amount: nanoAmount }]
        };

        try {
            // Вызывает системную штуку подтверждения в кошельке
            const result = await tonConnectUI.sendTransaction(transaction);
            
            // Если транзакция ушла, начисляем баланс в код
            tg.showAlert("Оплата подтверждена! Баланс зачислится через 10 секунд.");
            
            setTimeout(() => {
                user.bal += parseFloat(amount);
                save();
                tg.showPopup({ message: "TON зачислены на ваш баланс!" });
            }, 10000);

        } catch (e) {
            tg.showAlert("Ошибка или отмена транзакции.");
        }
    }

    function placeBet() {
        const val = parseFloat(document.getElementById('play-bet').value);
        if(user.bal < val) return tg.showAlert("Мало TON!");
        user.bal -= val;
        gamePlayers.push({name: user.name, bet: val, color: '#' + Math.floor(Math.random()*16777215).toString(16)});
        save(); updateGameUI();
        if(gamePlayers.length >= 2 && !timerIv) startTimer();
    }

    function startTimer() {
        let s = 10;
        timerIv = setInterval(() => {
            document.getElementById('game-status').innerText = "СТАРТ ЧЕРЕЗ " + s;
            if(s <= 0) { clearInterval(timerIv); timerIv = null; spin(); }
            s--;
        }, 1000);
    }

    function spin() {
        const deg = 3600 + Math.random()*360;
        document.getElementById('mainWheel').style.transform = `rotate(${deg}deg)`;
        setTimeout(() => {
            const total = gamePlayers.reduce((a,b) => a+b.bet, 0);
            const win = gamePlayers[Math.floor(Math.random()*gamePlayers.length)];
            tg.showAlert("ПОБЕДА: " + win.name);
            if(win.name === user.name) { user.bal += total; save(); }
            gamePlayers = [];
            document.getElementById('mainWheel').style.transform = `rotate(0deg)`;
            updateGameUI();
        }, 6500);
    }

    function drawWheel() {
        const ctx = document.getElementById('mainWheel').getContext('2d');
        ctx.clearRect(0,0,600,600);
        if(gamePlayers.length === 0) {
            ctx.beginPath(); ctx.fillStyle = "#141828"; ctx.arc(300,300,280,0,7); ctx.fill(); return;
        }
        let start = 0; const total = gamePlayers.reduce((a,b)=>a+b.bet,0);
        gamePlayers.forEach(p => {
            const s = (p.bet/total)*Math.PI*2;
            ctx.beginPath(); ctx.fillStyle = p.color; ctx.moveTo(300,300); ctx.arc(300,300,280,start,start+s); ctx.fill();
            start += s;
        });
    }

    function updateGameUI() { drawWheel(); document.getElementById('game-players').innerHTML = gamePlayers.map(p => `<div>@${p.name}: ${p.bet} TON</div>`).join(''); }
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id==='lobby') document.querySelectorAll('.nav-btn')[0].classList.add('active');
        if(id==='profile') document.querySelectorAll('.nav-btn')[1].classList.add('active');
    }
    function joinRoom(id) { nav('game'); updateGameUI(); }
    function leaveRoom() { gamePlayers = []; nav('lobby'); }
    function openAdmin() { document.getElementById('modal-admin').style.display='block'; }
    function adminAddBal() {
        const target = document.getElementById('adm-target-user').value;
        const amount = parseFloat(document.getElementById('adm-amount').value);
        if(target.includes(user.name)) { user.bal += amount; save(); tg.showAlert("Ок!"); }
    }

    init();
</script>
</body>
</html>
