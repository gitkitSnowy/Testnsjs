<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP ELITE v14</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600;800&display=swap');

        :root {
            --bg: #000000;
            --card: #0a0a0c;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.5);
            --gold: #ffb400;
            --red: #ff3b30;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        .app-shell { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .u-av { width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; margin-bottom: 15px; position: relative;
        }

        /* INPUTS & BUTTONS */
        .game-input {
            width: 100%; padding: 16px; background: #000; border: 1px solid var(--border);
            color: var(--gold); border-radius: 16px; font-family: 'Orbitron'; text-align: center;
            font-size: 18px; margin-bottom: 10px;
        }
        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-family: 'Orbitron';
            background: var(--accent); color: #fff;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        /* CHAT SYSTEM */
        .chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding: 5px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 13px; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--accent); }
        .msg.other { align-self: flex-start; background: #1c1c1e; }
        .msg-n { font-size: 9px; font-weight: 900; color: var(--gold); display: block; }

        /* TOWER */
        .t-grid { display: grid; grid-template-rows: repeat(8, 1fr); gap: 8px; }
        .t-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; opacity: 0.2; }
        .t-row.active { opacity: 1; }
        .t-tile { height: 45px; background: #161618; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .t-tile.win { background: #34c759; box-shadow: 0 0 15px #34c759; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; 
            padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 100;
        }
        .n-item { color: #555; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; }
        .n-item.active { color: var(--accent); }

        /* ADMIN PANEL */
        .adm-modal { position: fixed; inset: 0; background: #000; z-index: 2000; padding: 25px; display: none; flex-direction: column; overflow-y: auto; }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="h-av" class="u-av" src="">
            <div>
                <div id="h-name" style="font-weight:800;">Player</div>
                <div style="font-size:10px; color:var(--accent);">LVL <span id="h-lvl">1</span></div>
            </div>
        </div>
        <div style="text-align:right;">
            <div id="h-bal" style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">0.00</div>
            <div style="font-size:8px; letter-spacing:1px;">TON</div>
        </div>
    </header>

    <main>
        <div id="scr-lobby" class="screen active">
            <div class="card" onclick="ui.nav('roll')">
                <h2>⚔️ PvP ROLL</h2>
                <p style="font-size:12px; color:#666;">Ставки в реальном времени. Банк: <span id="l-bank" style="color:var(--gold);">0.00</span></p>
                <button class="btn" style="margin-top:10px;">ВОЙТИ</button>
            </div>
            <div class="card" onclick="ui.nav('tower')">
                <h2>🏰 TOWER</h2>
                <p style="font-size:12px; color:#666;">Поднимайся и умножай ставку до x150.</p>
                <button class="btn" style="background:#1c1c1e; margin-top:10px;">ИГРАТЬ</button>
            </div>
        </div>

        <div id="scr-roll" class="screen">
            <div class="card" style="text-align:center;">
                <h1 id="r-timer" style="font-family:'Orbitron'; font-size:48px;">15</h1>
                <p>БАНК: <span id="r-bank" style="color:var(--gold);">0.00</span> TON</p>
                <input type="number" id="bet-roll" class="game-input" value="1.0" inputmode="decimal">
                <button id="btn-roll-bet" class="btn">ПОСТАВИТЬ</button>
            </div>
        </div>

        <div id="scr-tower" class="screen">
            <div class="card">
                <div class="t-grid" id="t-grid"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <button id="btn-t-start" class="btn">ИГРАТЬ (5)</button>
                    <button id="btn-t-cash" class="btn" style="background:var(--gold); color:#000; display:none;">CASH</button>
                </div>
            </div>
        </div>

        <div id="scr-profile" class="screen">
            <div class="card" style="text-align:center;">
                <h2 id="p-name">Player</h2>
                <div style="display:flex; justify-content:center; gap:20px; font-size:11px;">
                    <span>XP: <b id="p-xp">0</b></span>
                    <span>WINS: <b id="p-wins">0</b></span>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn" style="flex:1; font-size:10px; background:#1c1c1e;" onclick="chat.set('global')" id="tab-g">ЧАТ</button>
                <button class="btn" style="flex:1; font-size:10px; background:#1c1c1e;" onclick="chat.set('support')" id="tab-s">ПОДДЕРЖКА</button>
            </div>

            <div class="card">
                <div class="chat-box" id="chat-render"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chat-in" class="game-input" style="font-family:'Inter'; font-size:14px; margin:0;" placeholder="Сообщение...">
                    <button class="btn" style="width:60px;" onclick="chat.send()">></button>
                </div>
            </div>

            <button id="adm-trigger" class="btn" style="background:var(--red); margin-top:15px; display:none;" onclick="admin.open()">ADMIN CP</button>
        </div>
    </main>

    <nav>
        <div class="n-item active" onclick="ui.nav('lobby')"><i>🏠</i>ГЛАВНАЯ</div>
        <div class="n-item" onclick="ui.nav('tower')"><i>🏰</i>БАШНЯ</div>
        <div class="n-item" onclick="ui.nav('profile')"><i>👤</i>ПРОФИЛЬ</div>
    </nav>
</div>

<div id="adm-modal" class="adm-modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--red);">ADMIN</h2>
        <button class="btn" style="width:auto; padding:10px;" onclick="admin.close()">X</button>
    </div>
    <div class="card" style="margin-top:20px;">
        <label>БАЛАНС</label><input type="number" id="adm-bal" class="game-input">
        <label>LVL</label><input type="number" id="adm-lvl" class="adm-input" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333;">
        <button class="btn" style="margin-top:10px;" onclick="admin.save()">ОБНОВИТЬ</button>
    </div>
    <div class="card">
        <label>ПОДКРУТКА TOWER (%): <b id="adm-v">45</b></label>
        <input type="range" id="adm-range" min="0" max="100" value="45" style="width:100%;">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = {
        u: { bal: 100, lvl: 1, xp: 0, wins: 0, name: "Player" },
        roll: { timer: 15, bank: 0 },
        tower: { active: false, floor: 0, rtp: 45 },
        chat: { mode: 'global', g: [], s: [] }
    };

    const ui = {
        nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-'+id).classList.add('active');
            if(id === 'tower') tower.init();
            this.sync();
        },
        sync() {
            document.getElementById('h-bal').innerText = db.u.bal.toFixed(2);
            document.getElementById('h-lvl').innerText = db.u.lvl;
            document.getElementById('h-name').innerText = db.u.name;
            document.getElementById('p-name').innerText = db.u.name;
            document.getElementById('p-xp').innerText = db.u.xp;
            document.getElementById('p-wins').innerText = db.u.wins;
        }
    };

    const roll = {
        init() {
            setInterval(() => {
                db.roll.timer--;
                if(db.roll.timer < 0) {
                    db.roll.timer = 15;
                    db.roll.bank = 0;
                    tg.showAlert("Раунд завершен!");
                }
                document.getElementById('r-timer').innerText = db.roll.timer;
                document.getElementById('r-bank').innerText = db.roll.bank.toFixed(2);
                document.getElementById('l-bank').innerText = db.roll.bank.toFixed(2);
            }, 1000);
        }
    };

    const tower = {
        init() {
            const g = document.getElementById('t-grid'); g.innerHTML = '';
            for(let i=7; i>=0; i--) {
                g.innerHTML += `<div class="t-row" id="tr-${i}"><div class="t-tile" onclick="tower.step(${i},0)">?</div><div class="t-tile" onclick="tower.step(${i},1)">?</div><div class="t-tile" onclick="tower.step(${i},2)">?</div></div>`;
            }
        },
        start() {
            if(db.u.bal < 5) return;
            db.u.bal -= 5; db.tower.active = true; db.tower.floor = 0;
            document.getElementById('btn-t-start').style.display = 'none';
            document.getElementById('btn-t-cash').style.display = 'block';
            this.draw(); ui.sync();
        },
        draw() {
            document.querySelectorAll('.t-row').forEach(r => r.classList.remove('active'));
            document.getElementById('tr-'+db.tower.floor).classList.add('active');
        },
        step(f, t) {
            if(!db.tower.active || f !== db.tower.floor) return;
            const win = (Math.random() * 100) < db.tower.rtp;
            if(win) {
                document.getElementById('tr-'+f).children[t].classList.add('win');
                db.tower.floor++; db.u.xp += 20;
                if(db.tower.floor > 7) this.cashout(); else this.draw();
            } else { tg.showAlert("Lose!"); this.reset(); }
            ui.sync();
        },
        cashout() {
            const p = [10, 25, 50, 100, 250, 500, 1000, 2500][db.tower.floor-1] || 10;
            db.u.bal += p; db.u.wins++; this.reset(); tg.showAlert("Win: " + p);
        },
        reset() {
            db.tower.active = false; document.getElementById('btn-t-start').style.display = 'block';
            document.getElementById('btn-t-cash').style.display = 'none'; this.init(); ui.sync();
        }
    };

    const chat = {
        set(m) { db.chat.mode = m; this.render(); },
        send() {
            const inp = document.getElementById('chat-in');
            if(!inp.value) return;
            const m = { u: db.u.name, t: inp.value };
            if(db.chat.mode === 'global') db.chat.g.push(m); else db.chat.s.push(m);
            inp.value = ''; this.render();
        },
        render() {
            const r = document.getElementById('chat-render');
            const data = db.chat.mode === 'global' ? db.chat.g : db.chat.s;
            r.innerHTML = data.map(m => `<div class="msg ${m.u === db.u.name ? 'me' : 'other'}"><span class="msg-n">${m.u}</span>${m.t}</div>`).join('');
            r.scrollTop = r.scrollHeight;
        }
    };

    const admin = {
        open() { document.getElementById('adm-modal').style.display = 'flex'; },
        close() { document.getElementById('adm-modal').style.display = 'none'; },
        save() {
            db.u.bal = parseFloat(document.getElementById('adm-bal').value);
            db.u.lvl = parseInt(document.getElementById('adm-lvl').value);
            ui.sync(); this.close();
        }
    };

    document.getElementById('adm-range').oninput = function() {
        db.tower.rtp = this.value; document.getElementById('adm-v').innerText = this.value;
    };

    document.getElementById('btn-roll-bet').onclick = () => {
        const v = parseFloat(document.getElementById('bet-roll').value);
        if(db.u.bal >= v) { db.u.bal -= v; db.roll.bank += v; ui.sync(); }
    };
    document.getElementById('btn-t-start').onclick = () => tower.start();
    document.getElementById('btn-t-cash').onclick = () => tower.cashout();

    window.onload = () => {
        tg.ready(); tg.expand();
        if(tg.initDataUnsafe?.user) {
            db.u.name = tg.initDataUnsafe.user.first_name;
            if(tg.initDataUnsafe.user.username === 'Kegovich' || tg.initDataUnsafe.user.id === 6418873752) {
                document.getElementById('adm-trigger').style.display = 'block';
            }
        }
        ui.sync(); roll.init();
    };
</script>
</body>
</html>
