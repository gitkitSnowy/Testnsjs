<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP ELITE v16</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS SECTION - ПРЕМИАЛЬНЫЙ ТЕМНЫЙ ДИЗАЙН 
        */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-color: #000000;
            --panel-color: #0c0c0e;
            --accent-color: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --gold-color: #ffb400;
            --red-color: #ff3b30;
            --green-color: #34c759;
            --border-color: rgba(255, 255, 255, 0.08);
            --kb-bg: #161618;
            --key-bg: #2c2c2e;
            --key-active: #444446;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* ОСНОВНАЯ ОБОЛОЧКА */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            background: radial-gradient(circle at top left, rgba(0,122,255,0.05), transparent);
        }

        /* ШАПКА ПРИЛОЖЕНИЯ */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .user-block { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 2px solid var(--accent-color);
            object-fit: cover;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .user-meta { display: flex; flex-direction: column; }
        .user-name { font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
        .user-level { font-size: 10px; color: var(--accent-color); font-weight: 900; text-transform: uppercase; }

        .balance-block { text-align: right; }
        .balance-label { font-size: 8px; color: #666; letter-spacing: 1px; margin-bottom: 2px; }
        .balance-value { font-family: 'Orbitron'; color: var(--gold-color); font-size: 20px; font-weight: 900; }

        /* КОНТЕНТНАЯ ОБЛАСТЬ */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 150px;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        .screen { display: none; }
        .screen.active { display: block; animation: screenSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes screenSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* КАРТОЧКИ И ЭЛЕМЕНТЫ */
        .card {
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ЦИФРОВОЕ КОЛЕСО ROLL */
        .roll-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0 25px;
        }
        .wheel-svg {
            width: 90%;
            height: 90%;
            transform: rotate(-90deg);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .timer-display {
            position: absolute;
            font-family: 'Orbitron';
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        /* TOWER GRID */
        .tower-engine { display: grid; grid-template-rows: repeat(8, 1fr); gap: 10px; }
        .tower-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; opacity: 0.15; transition: 0.3s; }
        .tower-row.active { opacity: 1; }
        .tower-tile {
            height: 52px;
            background: #1c1c1e;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .tower-tile.win { background: var(--green-color); color: #000; box-shadow: 0 0 20px var(--green-color); border: none; }
        .tower-tile.lose { background: var(--red-color); opacity: 0.7; border: none; }

        /* ИНПУТЫ И КНОПКИ */
        .input-display {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--gold-color);
            font-family: 'Orbitron';
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-display:empty::before { content: "0.00"; color: #333; }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            border: none;
            font-weight: 900;
            font-family: 'Orbitron';
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-main { background: var(--accent-color); color: #fff; box-shadow: 0 10px 25px var(--accent-glow); }
        .btn-gold { background: var(--gold-color); color: #000; }
        .btn:active { transform: scale(0.95); }

        /* ЧАТ */
        .chat-container {
            height: 300px;
            overflow-y: auto;
            background: #050505;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            max-width: 85%;
            line-height: 1.5;
        }
        .msg-mine { align-self: flex-end; background: var(--accent-color); border-bottom-right-radius: 4px; }
        .msg-theirs { align-self: flex-start; background: #1c1c1e; border-bottom-left-radius: 4px; }
        .msg-author { font-size: 10px; font-weight: 900; color: var(--gold-color); margin-bottom: 4px; display: block; }

        /* КАСТОМНАЯ КЛАВИАТУРА */
        .keyboard-engine {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #111111;
            border-top: 1px solid var(--border-color);
            z-index: 9999;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 8px 6px 35px;
        }
        .keyboard-engine.visible { bottom: 0; }
        
        .kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 7px; }
        .key {
            background: var(--key-bg);
            border-radius: 6px;
            height: 48px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 1px 0 rgba(0,0,0,0.5);
        }
        .key:active { background: var(--key-active); transform: scale(0.9); }
        .key.wide { flex: 1.5; background: #3a3a3c; }
        .key.space { flex: 5; }
        .key.func { background: #3a3a3c; font-size: 14px; }

        /* НАВИГАЦИЯ */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid var(--border-color);
            z-index: 500;
        }
        .nav-item { color: #555; text-align: center; font-size: 11px; font-weight: 800; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 5px; }

        /* АДМИН ПАНЕЛЬ */
        .admin-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
        }
        .adm-card { background: #0c0c0c; border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .adm-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin: 8px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="user-block">
            <img id="top-avatar" class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Alex">
            <div class="user-meta">
                <span class="user-name" id="top-name">Alexander</span>
                <span class="user-level">Premium Elite • LVL <span id="top-lvl">1</span></span>
            </div>
        </div>
        <div class="balance-block">
            <div class="balance-label">CREDITS</div>
            <div class="balance-value"><span id="top-bal">0.00</span></div>
        </div>
    </header>

    <main id="view-port">
        <div id="scr-roll" class="screen active">
            <div class="card">
                <div class="roll-box">
                    <svg class="wheel-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#1c1c1e" stroke-width="8" />
                        <circle id="wheel-progress" cx="50" cy="50" r="45" fill="none" stroke="var(--accent-color)" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="0" />
                    </svg>
                    <div class="timer-display" id="roll-time">15</div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <div style="text-align:left;"><small style="color:#666">БАНК</small><br><b style="color:var(--gold-color); font-size:18px;" id="roll-bank">0.00</b></div>
                    <div style="text-align:right;"><small style="color:#666">ИГРОКИ</small><br><b style="font-size:18px;" id="roll-count">0</b></div>
                </div>
                <div class="input-display" id="inp-roll-bet" onclick="kboard.show('num', 'inp-roll-bet')">1.00</div>
                <button class="btn btn-main" onclick="engine.placeBet()">СДЕЛАТЬ СТАВКУ</button>
            </div>
        </div>

        <div id="scr-tower" class="screen">
            <div class="card">
                <div class="tower-engine" id="tower-grid"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:25px;">
                    <button class="btn btn-main" id="tw-btn-start" onclick="engine.towerStart()">СТАВКА 5.0</button>
                    <button class="btn btn-gold" id="tw-btn-cash" style="display:none;" onclick="engine.towerCash()">CASH OUT</button>
                </div>
            </div>
        </div>

        <div id="scr-profile" class="screen">
            <div class="card" style="text-align:center;">
                <h2 id="prof-name" style="margin: 0 0 10px 0; font-size:24px;">Alexander</h2>
                <div style="display:flex; justify-content:center; gap:25px;">
                    <div><small style="color:#666">XP</small><br><b id="prof-xp">0</b></div>
                    <div><small style="color:#666">WINS</small><br><b id="prof-wins">0</b></div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-main" style="flex:1; height:45px; padding:0; font-size:12px;" onclick="engine.setChat('global')">ГЛОБАЛ</button>
                <button class="btn btn-main" style="flex:1; height:45px; padding:0; font-size:12px; background:#1c1c1e;" onclick="engine.setChat('support')">SUPPORT</button>
            </div>

            <div class="chat-container" id="chat-view"></div>
            
            <div style="display:flex; gap:10px;">
                <div class="input-display" id="inp-chat-msg" style="margin:0; font-family:'Inter'; font-size:15px; text-align:left; justify-content:flex-start; padding:0 20px; flex:1;" onclick="kboard.show('alpha', 'inp-chat-msg')"></div>
                <button class="btn btn-main" style="width:65px; padding:0;" onclick="engine.sendMessage()">></button>
            </div>

            <button id="adm-btn" class="btn" style="background:var(--red-color); margin-top:25px; display:none;" onclick="admin.open()">ADMIN PANEL</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" id="nav-roll" onclick="engine.navigate('roll')"><span>⚔️</span>ROLL</div>
        <div class="nav-item" id="nav-tower" onclick="engine.navigate('tower')"><span>🏰</span>TOWER</div>
        <div class="nav-item" id="nav-profile" onclick="engine.navigate('profile')"><span>👤</span>PROFILE</div>
    </nav>
</div>

<div class="keyboard-engine" id="kb-wrapper">
    <div style="display:flex; justify-content:space-between; padding:0 15px 10px; align-items:center;">
        <span id="kb-status" style="font-size:11px; font-weight:800; color:var(--accent-color);">РУССКАЯ РАСКЛАДКА</span>
        <div onclick="kboard.hide()" style="padding:5px 10px; color:var(--accent-color); font-weight:900;">ГОТОВО</div>
    </div>
    <div id="kb-content"></div>
</div>

<div id="admin-panel" class="admin-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="color:var(--red-color); font-family:'Orbitron'; margin:0;">SYSTEM ROOT</h2>
        <button onclick="admin.close()" class="key" style="width:45px; flex:none;">X</button>
    </div>

    <div class="adm-card">
        <h3>МОДИФИКАЦИЯ АККАУНТА</h3>
        <label>БАЛАНС</label><input type="number" id="adm-set-bal" class="adm-input">
        <label>УРОВЕНЬ</label><input type="number" id="adm-set-lvl" class="adm-input">
        <button class="btn btn-main" onclick="admin.saveUser()">СОХРАНИТЬ</button>
    </div>

    <div class="adm-card">
        <h3>УПРАВЛЕНИЕ ГЕЙМПЛЕЕМ</h3>
        <label>RTP TOWER (Шанс %): <b id="rtp-val">45</b></label>
        <input type="range" id="adm-rtp" min="0" max="100" value="45" style="width:100%; margin:15px 0;">
    </div>

    <div class="adm-card">
        <h3>АКТИВНЫЕ ИГРОКИ (DB)</h3>
        <div id="adm-player-list"></div>
    </div>
</div>

<script>
/* JAVASCRIPT SECTION - ЛОГИКА ПРИЛОЖЕНИЯ 
*/
const tg = window.Telegram.WebApp;

// СОСТОЯНИЕ ПРИЛОЖЕНИЯ
const state = {
    u: { name: "Alexander", bal: 500.0, lvl: 1, xp: 0, wins: 0, id: 6418873752, user: "Kegovich", av: "" },
    game: {
        roll: { timer: 15, bank: 0, players: 0, active: true },
        tower: { active: false, floor: 0, rtp: 45 }
    },
    chat: { mode: 'global', global: [], support: [] },
    kb: { target: null, lang: 'ru', isCaps: false, type: 'alpha' }
};

// СЛОВАРЬ МАТА
const badWords = ["хуй", "пизд", "ебал", "сука", "бля", "мудак", "гандон", "член", "залуп"];

// КОНФИГУРАЦИЯ КЛАВИАТУРЫ
const layouts = {
    ru: [
        ["й","ц","у","к","е","н","г","ш","щ","з","х"],
        ["ф","ы","в","а","п","р","о","л","д","ж","э"],
        ["⇧","я","ч","с","м","и","т","ь","б","ю","⌫"],
        ["🌐",",", " ", ".", "↩"]
    ],
    en: [
        ["q","w","e","r","t","y","u","i","o","p"],
        ["a","s","d","f","g","h","j","k","l"],
        ["⇧","z","x","c","v","b","n","m","⌫"],
        ["🌐",",", " ", ".", "↩"]
    ],
    num: [
        ["1","2","3"],
        ["4","5","6"],
        ["7","8","9"],
        [".","0","⌫"]
    ]
};

// МОДУЛЬ КЛАВИАТУРЫ
const kboard = {
    show(type, targetId) {
        state.kb.type = type;
        state.kb.target = document.getElementById(targetId);
        document.getElementById('kb-wrapper').classList.add('visible');
        this.render();
    },
    hide() {
        document.getElementById('kb-wrapper').classList.remove('visible');
    },
    render() {
        const cont = document.getElementById('kb-content');
        const layout = state.kb.type === 'num' ? layouts.num : layouts[state.kb.lang];
        
        document.getElementById('kb-status').innerText = 
            state.kb.type === 'num' ? "ЦИФРОВАЯ ПАНЕЛЬ" : 
            (state.kb.lang === 'ru' ? "РУССКАЯ РАСКЛАДКА" : "ENGLISH LAYOUT");

        cont.innerHTML = layout.map(row => `
            <div class="kb-row">
                ${row.map(k => {
                    let cls = "key";
                    let label = k;
                    let action = `kboard.press('${k}')`;

                    if(k === "⇧") { cls += " func"; action = "kboard.toggleCaps()"; }
                    if(k === "⌫") { cls += " func"; label = "BACK"; action = "kboard.back()"; }
                    if(k === "🌐") { cls += " func"; label = "RU/EN"; action = "kboard.toggleLang()"; }
                    if(k === " ") { cls += " space"; label = "ПРОБЕЛ"; }
                    if(k === "↩") { cls += " func"; label = "ВВОД"; action = "kboard.hide()"; }

                    // Применение Caps Lock
                    if(state.kb.isCaps && k.length === 1 && k !== " " && k !== "." && k !== ",") {
                        label = k.toUpperCase();
                    }

                    return `<div class="${cls}" onclick="${action}">${label}</div>`;
                }).join('')}
            </div>
        `).join('');
    },
    press(k) {
        let val = state.kb.target.innerText;
        if(k === " ") k = " ";
        if(k === "⇧" || k === "⌫" || k === "🌐" || k === "↩") return;
        
        const char = state.kb.isCaps ? k.toUpperCase() : k;
        state.kb.target.innerText = val + char;
        tg.HapticFeedback.selectionChanged();
    },
    back() {
        let val = state.kb.target.innerText;
        state.kb.target.innerText = val.slice(0, -1);
    },
    toggleCaps() {
        state.kb.isCaps = !state.kb.isCaps;
        this.render();
    },
    toggleLang() {
        state.kb.lang = state.kb.lang === 'ru' ? 'en' : 'ru';
        this.render();
    }
};

// МОДУЛЬ ЛОГИКИ ИГРЫ
const engine = {
    navigate(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'tower') this.towerInit();
        this.sync();
    },
    sync() {
        document.getElementById('top-bal').innerText = state.u.bal.toFixed(2);
        document.getElementById('top-lvl').innerText = state.u.lvl;
        document.getElementById('top-name').innerText = state.u.name;
        document.getElementById('prof-name').innerText = state.u.name;
        document.getElementById('prof-xp').innerText = state.u.xp;
        document.getElementById('prof-wins').innerText = state.u.wins;
        if(state.u.av) document.getElementById('top-avatar').src = state.u.av;
    },
    // ROLL LOGIC
    rollTimer() {
        setInterval(() => {
            if(!state.game.roll.active) return;
            state.game.roll.timer--;
            
            // Анимация прогресс-бара
            const circle = document.getElementById('wheel-progress');
            const offset = (state.game.roll.timer / 15) * 283;
            circle.style.strokeDashoffset = 283 - offset;

            if(state.game.roll.timer <= 0) {
                this.rollFinish();
                state.game.roll.timer = 15;
            }
            document.getElementById('roll-time').innerText = state.game.roll.timer;
            document.getElementById('roll-bank').innerText = state.game.roll.bank.toFixed(2);
            document.getElementById('roll-count').innerText = state.game.roll.players;
        }, 1000);
    },
    placeBet() {
        const amount = parseFloat(document.getElementById('inp-roll-bet').innerText);
        if(isNaN(amount) || amount <= 0) return tg.showAlert("Некорректная сумма");
        if(state.u.bal >= amount) {
            state.u.bal -= amount;
            state.game.roll.bank += amount;
            state.game.roll.players++;
            this.sync();
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            tg.showAlert("Недостаточно TON");
        }
    },
    rollFinish() {
        if(state.game.roll.bank > 0) {
            const win = state.game.roll.bank * 0.95;
            state.u.bal += win;
            state.u.wins++;
            tg.showAlert(`Раунд окончен! Вы забираете банк: ${win.toFixed(2)} TON`);
            state.game.roll.bank = 0;
            state.game.roll.players = 0;
            this.sync();
        }
    },
    // TOWER LOGIC
    towerInit() {
        const grid = document.getElementById('tower-grid');
        grid.innerHTML = '';
        for(let i=7; i>=0; i--) {
            grid.innerHTML += `
                <div class="tower-row" id="row-${i}">
                    <div class="tower-tile" onclick="engine.towerStep(${i},0)">?</div>
                    <div class="tower-tile" onclick="engine.towerStep(${i},1)">?</div>
                    <div class="tower-tile" onclick="engine.towerStep(${i},2)">?</div>
                </div>
            `;
        }
    },
    towerStart() {
        if(state.u.bal < 5) return tg.showAlert("Минимум 5 TON");
        state.u.bal -= 5;
        state.game.tower.active = true;
        state.game.tower.floor = 0;
        document.getElementById('tw-btn-start').style.display = 'none';
        document.getElementById('tw-btn-cash').style.display = 'block';
        this.towerUpdate();
        this.sync();
    },
    towerUpdate() {
        document.querySelectorAll('.tower-row').forEach(r => r.classList.remove('active'));
        document.getElementById('row-'+state.game.tower.floor).classList.add('active');
    },
    towerStep(f, t) {
        if(!state.game.tower.active || f !== state.game.tower.floor) return;
        
        const isWin = (Math.random() * 100) < state.game.tower.rtp;
        const row = document.getElementById('row-'+f).children;
        
        if(isWin) {
            row[t].classList.add('win');
            state.game.tower.floor++;
            state.u.xp += 25;
            if(state.game.tower.floor > 7) this.towerCash();
            else this.towerUpdate();
        } else {
            row[t].classList.add('lose');
            state.game.tower.active = false;
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => this.towerReset(), 800);
        }
        this.sync();
    },
    towerCash() {
        const multipliers = [1.2, 2.5, 6, 12, 28, 60, 140, 350];
        const prize = 5 * multipliers[state.game.tower.floor-1];
        state.u.bal += prize;
        state.u.wins++;
        tg.showAlert(`ПОБЕДА! Зачислено ${prize} TON`);
        this.towerReset();
    },
    towerReset() {
        state.game.tower.active = false;
        document.getElementById('tw-btn-start').style.display = 'block';
        document.getElementById('tw-btn-cash').style.display = 'none';
        this.towerInit();
    },
    // CHAT LOGIC
    setChat(m) { state.chat.mode = m; this.chatRender(); },
    sendMessage() {
        const inp = document.getElementById('inp-chat-msg');
        let text = inp.innerText.trim();
        if(!text) return;

        // Фильтр мата
        badWords.forEach(w => {
            const reg = new RegExp(w, 'gi');
            text = text.replace(reg, "***");
        });

        const msg = { u: state.u.name, t: text, mine: true };
        if(state.chat.mode === 'global') state.chat.global.push(msg);
        else state.chat.support.push(msg);
        
        inp.innerText = '';
        this.chatRender();
    },
    chatRender() {
        const view = document.getElementById('chat-view');
        const data = state.chat.mode === 'global' ? state.chat.global : state.chat.support;
        view.innerHTML = data.map(m => `
            <div class="msg-bubble ${m.mine ? 'msg-mine' : 'msg-theirs'}">
                <span class="msg-author">${m.u}</span>${m.t}
            </div>
        `).join('');
        view.scrollTop = view.scrollHeight;
    }
};

// МОДУЛЬ АДМИНКИ
const admin = {
    open() {
        document.getElementById('admin-panel').style.display = 'flex';
        document.getElementById('adm-set-bal').value = state.u.bal;
        document.getElementById('adm-set-lvl').value = state.u.lvl;
        this.renderPlayers();
    },
    close() { document.getElementById('admin-panel').style.display = 'none'; },
    saveUser() {
        state.u.bal = parseFloat(document.getElementById('adm-set-bal').value);
        state.u.lvl = parseInt(document.getElementById('adm-set-lvl').value);
        engine.sync();
        tg.showAlert("Данные обновлены");
    },
    renderPlayers() {
        const list = document.getElementById('adm-player-list');
        const mock = [
            { name: state.u.name, bal: state.u.bal, user: state.u.user },
            { name: "Kirov_User", bal: 15.0, user: "kirov43" },
            { name: "Test_Player", bal: 0.5, user: "tester" }
        ];
        list.innerHTML = mock.map(p => `
            <div class="adm-card" style="display:flex; justify-content:space-between; align-items:center; background:#111;">
                <div><b>${p.name}</b><br><small>${p.bal} TON</small></div>
                <button class="btn btn-main" style="width:auto; padding:8px 15px; font-size:10px;" onclick="window.open('tg://resolve?domain=${p.user}')">В ЛС</button>
            </div>
        `).join('');
    }
};

// ИНИЦИАЛИЗАЦИЯ
document.getElementById('adm-rtp').oninput = function() {
    state.game.tower.rtp = this.value;
    document.getElementById('rtp-val').innerText = this.value;
};

window.onload = () => {
    tg.ready();
    tg.expand();
    
    // Получение данных из Telegram
    if(tg.initDataUnsafe?.user) {
        const user = tg.initDataUnsafe.user;
        state.u.name = user.first_name;
        state.u.id = user.id;
        state.u.user = user.username || "user";
        state.u.av = user.photo_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.id}`;
        
        // Проверка прав админа
        if(user.id === 6418873752 || user.username === 'Kegovich') {
            document.getElementById('adm-btn').style.display = 'block';
        }
    }

    engine.sync();
    engine.rollTimer();
    engine.towerInit();
};
</script>
