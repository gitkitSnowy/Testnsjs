<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #070911;
            --panel: #141828;
            --accent: #2481cc;
            --gold: #ffcc00;
            --red: #ff4757;
            --green: #2ed573;
            --text: #ffffff;
            --sub: #8e8e93;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; position: relative; }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .u-info { display: flex; align-items: center; gap: 10px; }
        .u-avatar { width: 42px; height: 42px; border-radius: 14px; border: 2px solid var(--accent); object-fit: cover; }
        .bal-display { background: rgba(36, 129, 204, 0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .screen { display: none; }
        .screen.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .room-item {
            background: var(--panel); padding: 18px; border-radius: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .room-meta { line-height: 1.4; }
        .badge-lock { font-size: 10px; background: var(--red); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        .create-form { background: var(--panel); padding: 20px; border-radius: 25px; border: 1px solid var(--accent); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }
        .input-fld { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; font-size: 16px; }

        .game-header { text-align: center; margin-bottom: 20px; }
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 0 auto 20px; }
        canvas#mainWheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 24px; z-index: 10; color: var(--gold); }

        .players-container { background: var(--panel); border-radius: 20px; padding: 15px; }
        .player-row { display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px; }

        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: rgba(20, 24, 40, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px 0 calc(15px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-btn { color: var(--sub); text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { display: block; font-size: 20px; font-style: normal; margin-bottom: 4px; }

        .btn-action { background: var(--accent); border: none; color: white; padding: 16px; border-radius: 15px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-action:active { transform: scale(0.98); }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 25px; display: none; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <div class="u-info">
                <img id="my-avatar" class="u-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=K">
                <div>
                    <div id="my-name" style="font-weight: 800; font-size: 15px;">@User</div>
                    <div id="my-rank" style="font-size: 9px; color: var(--accent);">USER</div>
                </div>
            </div>
            <div class="bal-display">
                <span id="my-bal" style="font-weight: 900; color: var(--gold);">0.00</span> TON
            </div>
        </header>

        <main>
            <div id="scr-lobby" class="screen active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">Комнаты</h2>
                    <button class="btn-action" style="width: auto; padding: 8px 15px; font-size: 12px; margin: 0;" onclick="nav('create')">+ Создать</button>
                </div>
                
                <div class="room-item" style="border-left: 4px solid var(--gold);" onclick="joinRoom(0)">
                    <div class="room-meta">
                        <div style="font-weight: 800;">ОСНОВНОЙ ЗАЛ</div>
                        <div style="font-size: 11px; color: var(--sub);">Публичная • Без лимита игроков</div>
                    </div>
                    <div style="color: var(--accent); font-weight: 900;">ИГРАТЬ</div>
                </div>

                <div id="rooms-list"></div>
            </div>

            <div id="scr-create" class="screen">
                <h2 style="margin-bottom: 25px;">Новая комната</h2>
                <div class="create-form">
                    <div class="input-group">
                        <label>Макс. игроков</label>
                        <select id="c-players" class="input-fld">
                            <option value="2">2 Игрока (PvP Дуэль)</option>
                            <option value="3">3 Игрока</option>
                            <option value="4" selected>4 Игрока (Максимум)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Пароль (пусто — без пароля)</label>
                        <input type="password" id="c-pass" class="input-fld" placeholder="****">
                    </div>
                    <div class="input-group">
                        <label>Ставка входа (TON)</label>
                        <input type="number" id="c-bet" class="input-fld" value="1.0" min="0.1" step="0.1">
                    </div>
                    <button class="btn-action" onclick="processCreateRoom()">СОЗДАТЬ ЛОББИ</button>
                    <button class="btn-action" style="background: transparent;" onclick="nav('lobby')">ОТМЕНА</button>
                </div>
            </div>

            <div id="scr-game" class="screen">
                <div class="game-header">
                    <button onclick="leaveRoom()" style="float: left; background: none; border: none; color: var(--accent); font-size: 20px; cursor:pointer;">←</button>
                    <div id="game-title" style="font-weight: 800;">КОМНАТА #1</div>
                    <div id="game-status" style="color: var(--gold); font-size: 11px; margin-top: 5px;">ЖДЕМ ИГРОКОВ...</div>
                </div>

                <div class="wheel-box">
                    <div class="pointer">▼</div>
                    <canvas id="mainWheel" width="600" height="600"></canvas>
                </div>

                <div class="players-container" id="game-players"></div>

                <div id="bet-area" style="margin-top: 20px; display: flex; gap: 10px;">
                    <input type="number" id="play-bet" class="input-fld" style="flex: 1; text-align: center;" value="1.0">
                    <button class="btn-action" style="flex: 2; margin-top: 0;" onclick="placeBet()">СТАВКА</button>
                </div>
            </div>

            <div id="scr-profile" class="screen">
                <div style="text-align: center; padding: 20px 0;">
                    <img id="prof-img" class="u-avatar" style="width: 100px; height: 100px; border-radius: 30px; margin-bottom: 15px;" src="https://api.dicebear.com/7.x/initials/svg?seed=K">
                    <h2 id="prof-name">@User</h2>
                    <div id="ton-connect-button" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>
                    <button class="btn-action" style="background: #222;" onclick="window.Telegram.WebApp.showAlert('Версия 2.0.1. Владелец: @Kegovich')">О ПРИЛОЖЕНИИ</button>
                    <button id="adm-btn" class="btn-action" style="background: var(--gold); color: #000; display: none;" onclick="openAdmin()">АДМИН ПАНЕЛЬ</button>
                </div>
            </div>
        </main>

        <nav>
            <div class="nav-btn active" onclick="nav('lobby')"><i>🏠</i>Лобби</div>
            <div class="nav-btn" onclick="nav('profile')"><i>👤</i>Профиль</div>
        </nav>
    </div>

    <div id="modal-admin" class="modal">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--gold); margin:0;">ADMIN CONTROL</h2>
            <button onclick="document.getElementById('modal-admin').style.display='none'" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">✕</button>
        </div>
        
        <div style="background:var(--panel); padding:20px; border-radius:20px; margin-bottom:15px;">
            <h4 style="margin-top:0;">Экстренные функции</h4>
            <button class="btn-action" style="background:var(--red);" onclick="adminAction('reload')">ОБНОВИТЬ СЕРВЕР (ВОЗВРАТ TON)</button>
        </div>

        <div style="background:var(--panel); padding:20px; border-radius:20px;">
            <h4>Юзеры</h4>
            <input type="text" id="adm-target" class="input-fld" placeholder="@username" style="margin-bottom:10px;">
            <input type="number" id="adm-amt" class="input-fld" placeholder="Сумма TON">
            <button class="btn-action" onclick="adminAction('give')">НАЧИСЛИТЬ БАЛАНС</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const tonConnect = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/master/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        let user = { name: "Guest", bal: 50.0, role: "user", avatar: "" };
        let rooms = [];
        let currentRoomId = null;
        let gamePlayers = [];
        let isSpinning = false;
        let timerIv = null;

        function init() {
            tg.ready();
            tg.expand();
            const tgData = tg.initDataUnsafe?.user;

            user.name = tgData?.username || "Kegovich";
            user.avatar = tgData?.photo_url || `https://api.dicebear.com/7.x/initials/svg?seed=${user.name}`;
            
            document.getElementById('my-name').innerText = "@" + user.name;
            document.getElementById('prof-name').innerText = "@" + user.name;
            document.getElementById('my-avatar').src = user.avatar;
            document.getElementById('prof-img').src = user.avatar;

            if (user.name === "Kegovich" || user.name === "mas1sa") {
                user.role = "owner";
                document.getElementById('adm-btn').style.display = 'block';
                document.getElementById('my-rank').innerText = "OWNER / DEVELOPER";
            }

            updateUI();
            renderRooms();
            drawWheel();
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const btns = document.querySelectorAll('.nav-btn');
            if(id === 'lobby') btns[0].classList.add('active');
            if(id === 'profile') btns[1].classList.add('active');
        }

        function renderRooms() {
            const list = document.getElementById('rooms-list');
            list.innerHTML = rooms.map(r => `
                <div class="room-item" onclick="joinRoom(${r.id})">
                    <div class="room-meta">
                        <div style="font-weight:800;">ЛОББИ #${r.id} ${r.pass ? '<span class="badge-lock">ЗАМОК</span>' : ''}</div>
                        <div style="font-size:11px; color:var(--sub);">Игроков: ${r.players.length}/${r.max} • Вход: ${r.minBet} TON</div>
                    </div>
                    <div style="color:var(--accent); font-weight:900;">ЗАЙТИ</div>
                </div>
            `).join('');
        }

        function processCreateRoom() {
            const max = parseInt(document.getElementById('c-players').value);
            const pass = document.getElementById('c-pass').value;
            const bet = parseFloat(document.getElementById('c-bet').value);

            if(isNaN(bet) || bet < 0.1) return tg.showAlert("Минимальная ставка 0.1 TON!");

            const newRoom = {
                id: rooms.length + 1,
                max: max,
                pass: pass,
                minBet: bet,
                players: [],
                status: "waiting"
            };

            rooms.push(newRoom);
            renderRooms();
            nav('lobby');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function joinRoom(id) {
            const room = id === 0 ? {id: 0, max: 99, minBet: 0.1, pass: ""} : rooms.find(r => r.id === id);
            
            if(room.pass) {
                const input = prompt("Введите пароль от комнаты:");
                if(input !== room.pass) return tg.showAlert("Неверный пароль!");
            }

            currentRoomId = id;
            document.getElementById('game-title').innerText = id === 0 ? "ОСНОВНОЙ ЗАЛ" : `КОМНАТА #${id}`;
            document.getElementById('play-bet').value = room.minBet;
            
            gamePlayers = (id === 0) ? gamePlayers : (rooms.find(r => r.id === id).players || []);
            
            nav('game');
            updateGameUI();
        }

        function leaveRoom() {
            currentRoomId = null;
            if(timerIv) clearInterval(timerIv);
            document.getElementById('game-status').innerText = "ЖДЕМ ИГРОКОВ...";
            document.getElementById('game-status').style.color = "var(--gold)";
            nav('lobby');
        }

        function placeBet() {
            const betVal = parseFloat(document.getElementById('play-bet').value);
            const room = currentRoomId === 0 ? {minBet: 0.1, max: 99} : rooms.find(r => r.id === currentRoomId);

            if(isNaN(betVal) || betVal <= 0) return tg.showAlert("Ставка должна быть больше нуля!");
            if(betVal < room.minBet) return tg.showAlert(`Минимум: ${room.minBet} TON`);
            if(user.bal < betVal) return tg.showAlert("Недостаточно баланса!");
            if(gamePlayers.some(p => p.name.includes(user.name))) return tg.showAlert("Вы уже в игре!");
            if(gamePlayers.length >= room.max) return tg.showAlert("Комната переполнена!");

            user.bal -= betVal;
            gamePlayers.push({
                name: "@" + user.name,
                bet: betVal,
                color: '#2481cc',
                avatar: user.avatar
            });

            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
            updateGameUI();

            if(gamePlayers.length >= 2) {
                if(!timerIv) startCountdown();
            }
        }

        function startCountdown() {
            let sec = 10;
            document.getElementById('game-status').style.color = "var(--green)";
            timerIv = setInterval(() => {
                document.getElementById('game-status').innerText = `СТАРТ ЧЕРЕЗ ${sec} СЕК...`;
                if(sec <= 0) {
                    clearInterval(timerIv);
                    timerIv = null;
                    executeSpin();
                }
                sec--;
            }, 1000);
        }

        function executeSpin() {
            if(isSpinning) return;
            isSpinning = true;
            const rot = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('mainWheel').style.transform = `rotate(${rot}deg)`;

            setTimeout(() => {
                const total = gamePlayers.reduce((s, p) => s + p.bet, 0);
                const winner = gamePlayers[Math.floor(Math.random() * gamePlayers.length)];
                
                tg.showAlert(`РАУНД ОКОНЧЕН!\nПобедил: ${winner.name}\nВыигрыш: ${total.toFixed(2)} TON`);
                
                if(winner.name.includes(user.name)) {
                    user.bal += total;
                }
                
                if(currentRoomId !== 0) {
                    rooms = rooms.filter(r => r.id !== currentRoomId);
                }

                resetGame();
            }, 6500);
        }

        function resetGame() {
            isSpinning = false;
            gamePlayers = [];
            document.getElementById('mainWheel').style.transform = "rotate(0deg)";
            document.getElementById('game-status').innerText = "ЖДЕМ ИГРОКОВ...";
            document.getElementById('game-status').style.color = "var(--gold)";
            if(currentRoomId === null) renderRooms();
            else updateGameUI();
            updateUI();
        }

        const canvas = document.getElementById('mainWheel');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            ctx.clearRect(0,0,600,600);
            const total = gamePlayers.reduce((s,p) => s+p.bet, 0);
            if(gamePlayers.length === 0) {
                ctx.beginPath(); ctx.fillStyle = "#1c2130";
                ctx.arc(300,300,280,0,7); ctx.fill();
                return;
            }
            let start = 0;
            gamePlayers.forEach(p => {
                const slice = (p.bet/total)*2*Math.PI;
                ctx.beginPath(); ctx.fillStyle = p.color;
                ctx.moveTo(300,300);
                ctx.arc(300,300,280,start,start+slice);
                ctx.fill();
                start += slice;
            });
        }

        function updateGameUI() {
            drawWheel();
            const list = document.getElementById('game-players');
            list.innerHTML = gamePlayers.map(p => `
                <div class="player-row">
                    <img src="${p.avatar}" style="width:25px; height:25px; border-radius:50%; margin-right:10px;">
                    <div style="flex:1; font-weight:bold; font-size:13px;">${p.name}</div>
                    <div style="font-weight:900; color:var(--gold);">${p.bet} TON</div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('my-bal').innerText = user.bal.toFixed(2);
        }

        function openAdmin() { document.getElementById('modal-admin').style.display = 'block'; }

        function adminAction(type) {
            if(type === 'reload') {
                gamePlayers.forEach(p => {
                    if(p.name.includes(user.name)) user.bal += p.bet;
                });
                rooms = [];
                leaveRoom();
                tg.showAlert("Все ставки возвращены!");
            }
            if(type === 'give') {
                const amt = parseFloat(document.getElementById('adm-amt').value);
                if(!isNaN(amt)) { user.bal += amt; updateUI(); }
            }
        }

        init();
    </script>
</body>
</html>
