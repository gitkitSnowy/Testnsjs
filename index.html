<body>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQgyNz7P5K4_dlNQsKqniO-kEALW3_OWg",
        authDomain: "casino-213b9.firebaseapp.com",
        databaseURL: "https://casino-213b9-default-rtdb.firebaseio.com",
        projectId: "casino-213b9",
        storageBucket: "casino-213b9.firebasestorage.app",
        messagingSenderId: "104292026196",
        appId: "1:104292026196:web:4b33abbb085143ce69eac1"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();
    
    // TON Connect
    let tonConnector = null;
    let walletAddress = null;
    
    async function initTonConnect() {
        if(window.TonConnect) {
            tonConnector = new window.TonConnect.TonConnect({
                manifestUrl: "https://raw.githubusercontent.com/ton-connect/demo-dapp/main/tonconnect-manifest.json"
            });
            tonConnector.onStatusChange((wallet) => {
                if(wallet) {
                    walletAddress = wallet.account.address;
                    document.getElementById("walletInfo").innerHTML = `💳 ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    document.getElementById("walletBtn").innerHTML = "🔌 Отключить";
                } else {
                    walletAddress = null;
                    document.getElementById("walletInfo").innerHTML = "";
                    document.getElementById("walletBtn").innerHTML = "🔌 Подключить кошелек";
                }
            });
        }
    }
    
    document.getElementById("walletBtn").onclick = async () => {
        if(!tonConnector) await initTonConnect();
        if(walletAddress) {
            await tonConnector.disconnect();
        } else {
            try {
                await tonConnector.connect({
                    bridgeUrl: "https://bridge.tonapi.io/bridge",
                    universalLink: "https://app.tonkeeper.com/ton-connect"
                });
            } catch(e) { tg.showPopup({title:"Ошибка", message:"Не удалось подключить кошелек"}); }
        }
    };
    
    initTonConnect();
    
    let currentUser = null;
    let userData = { balance: 5, verified: false, isAdmin: false, isSupport: false };
    let activeDuel = null;
    let towerGameActive = false;
    let towerCells = [];
    let currentMultiplier = 1;
    let towerBetAmount = 0;
    
    async function initUser() {
        const user = tg.initDataUnsafe?.user;
        if(!user) { document.getElementById("usernameDisplay").innerText = "Guest"; return; }
        currentUser = { id: user.id, username: user.username || user.first_name, photo: user.photo_url };
        document.getElementById("usernameDisplay").innerText = "@" + currentUser.username;
        if(currentUser.photo) document.getElementById("avatarDiv").style.backgroundImage = `url(${currentUser.photo})`;
        else document.getElementById("avatarDiv").innerText = currentUser.username[0].toUpperCase();
        
        const userRef = ref(db, `users/${currentUser.id}`);
        const snap = await get(userRef);
        if(snap.exists()) {
            userData = snap.val();
        } else {
            userData = { balance: 10, verified: false, isAdmin: false, isSupport: false, username: currentUser.username };
            await set(userRef, userData);
        }
        if(currentUser.username === "Kegovich") {
            userData.isAdmin = true;
            await update(userRef, { isAdmin: true });
        }
        updateUI();
        listenForDuels();
        loadTickets();
    }
    
    function updateUI() {
        document.getElementById("balanceDisplay").innerHTML = `💰 ${userData.balance.toFixed(2)} TON`;
        if(userData.verified) document.getElementById("verifyBadge").innerHTML = '<span class="badge">✅ Верифицирован</span>';
        if(userData.isAdmin || userData.isSupport) document.querySelector(".admin-tab").style.display = "block";
        if(userData.isAdmin) document.getElementById("adminTab").style.display = "block";
    }
    
    async function updateBalance(amount) {
        const userRef = ref(db, `users/${currentUser.id}`);
        userData.balance += amount;
        await update(userRef, { balance: userData.balance });
        updateUI();
    }
    
    // Депозит
    document.getElementById("depositBtn").onclick = async () => {
        if(!walletAddress) { tg.showPopup({title:"Ошибка", message:"Сначала подключите TON кошелек!"}); return; }
        try {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: "EQD___demo_casino_wallet_address", // demo адрес, в реальности заменишь
                    amount: "1000000000" // 1 TON = 10^9 nanoTON
                }]
            };
            await tonConnector.sendTransaction(transaction);
            tg.showPopup({title:"Успех", message:"Депозит 1 TON обрабатывается!"});
            await updateBalance(1);
        } catch(e) { tg.showPopup({title:"Ошибка", message:"Транзакция отклонена"}); }
    };
    
    // Вывод
    document.getElementById("withdrawBtn").onclick = async () => {
        if(!walletAddress) { tg.showPopup({message:"Подключи кошелек"}); return; }
        let amount = parseFloat(document.getElementById("withdrawAmount").value);
        if(isNaN(amount) || amount <=0 || amount > userData.balance) { tg.showPopup({message:"Некорректная сумма"}); return; }
        tg.showPopup({title:"Вывод", message:`Запрос на вывод ${amount} TON на ${walletAddress.slice(0,8)}... отправлен. Админ обработает.`});
        await updateBalance(-amount);
    };
    
    // РУЛЕТКА
    document.getElementById("createDuelBtn").onclick = async () => {
        let bet = parseFloat(document.getElementById("betAmount").value);
        if(isNaN(bet) || bet<=0 || bet > userData.balance) { tg.showPopup({message:"Недостаточно средств!"}); return; }
        const duelRef = ref(db, "duels/active");
        const snap = await get(duelRef);
        if(snap.exists() && snap.val().status === "waiting") { tg.showPopup({message:"Дуэль уже есть!"}); return; }
        await updateBalance(-bet);
        await set(duelRef, { creator: currentUser.id, creatorBet: bet, status: "waiting", creatorName: currentUser.username });
        document.getElementById("duelInfo").innerHTML = `⚔️ Дуэль создана! Ставка ${bet} TON`;
    };
    
    document.getElementById("joinDuelBtn").onclick = async () => {
        const duelRef = ref(db, "duels/active");
        const snap = await get(duelRef);
        if(!snap.exists() || snap.val().status !== "waiting") { tg.showPopup({message:"Нет дуэли"}); return; }
        let duel = snap.val();
        if(duel.creator === currentUser.id) return;
        let joinBet = duel.creatorBet;
        if(joinBet > userData.balance) { tg.showPopup({message:`Нужно ${joinBet} TON`}); return; }
        await updateBalance(-joinBet);
        await update(duelRef, { opponent: currentUser.id, opponentBet: joinBet, status: "active" });
        let winnerId = duel.creatorBet >= joinBet ? duel.creator : currentUser.id;
        let prize = duel.creatorBet + joinBet;
        await update(duelRef, { winner: winnerId, prize: prize, status: "finished" });
        await update(ref(db, `users/${winnerId}`), { balance: (await get(ref(db, `users/${winnerId}`))).val().balance + prize });
        tg.showPopup({title:"Победа!", message:`Ты выиграл ${prize} TON!`});
        await remove(duelRef);
        initUser();
        drawWheel(duel.creatorBet, joinBet);
    };
    
    function drawWheel(b1, b2) {
        let total = b1+b2;
        let angle1 = (b1/total)*360;
        let svg = document.getElementById("wheelSvg");
        let existing = svg.querySelectorAll("#playerSlice,#opponentSlice");
        existing.forEach(el=>el.remove());
        let pSlice = document.createElementNS("http://www.w3.org/2000/svg","path");
        pSlice.setAttribute("d", `M 50 50 L 50 2 A 48 48 0 ${angle1>180?1:0} 1 ${50+48*Math.cos(angle1*Math.PI/180)} ${50+48*Math.sin(angle1*Math.PI/180)} Z`);
        pSlice.setAttribute("fill","#ff6b6b");
        pSlice.setAttribute("id","playerSlice");
        svg.appendChild(pSlice);
    }
    
    function listenForDuels() {
        onValue(ref(db, "duels/active"), (snap) => {
            if(snap.exists() && snap.val().status === "waiting") document.getElementById("duelInfo").innerHTML = `🎲 Есть дуэль! Ставка ${snap.val().creatorBet} TON`;
            else if(!snap.exists()) document.getElementById("duelInfo").innerHTML = `⚔️ Нет активной дуэли`;
        });
    }
    
    // TOWER
    document.getElementById("startTowerBtn").onclick = async () => {
        let bet = parseFloat(document.getElementById("towerBet").value);
        if(bet > userData.balance || bet <=0) { tg.showPopup({message:"Недостаточно TON"}); return; }
        await updateBalance(-bet);
        towerBetAmount = bet;
        currentMultiplier = 1;
        towerGameActive = true;
        document.getElementById("towerMultiplier").innerHTML = "x1";
        document.getElementById("towerStatus").innerHTML = "🏆 Нажми на безопасную плиту!";
        document.getElementById("startTowerBtn").style.display = "none";
        document.getElementById("cashoutTowerBtn").style.display = "block";
        let grid = document.getElementById("towerGrid");
        grid.style.display = "grid";
        grid.innerHTML = "";
        towerCells = [];
        for(let i=0;i<9;i++) {
            let cell = document.createElement("div");
            cell.className = "tower-cell";
            cell.innerText = "❓";
            cell.dataset.index = i;
            cell.onclick = () => towerReveal(i);
            grid.appendChild(cell);
            towerCells.push({revealed:false, isBomb: Math.random() < 0.2 && i>2});
        }
    };
    
    function towerReveal(idx) {
        if(!towerGameActive) return;
        if(towerCells[idx].revealed) return;
        if(towerCells[idx].isBomb) {
            document.getElementById("towerStatus").innerHTML = "💥 Ты наткнулся на бомбу! Потеряно!";
            towerGameActive = false;
            document.getElementById("startTowerBtn").style.display = "block";
            document.getElementById("cashoutTowerBtn").style.display = "none";
        } else {
            towerCells[idx].revealed = true;
            document.querySelectorAll(".tower-cell")[idx].classList.add("revealed");
            document.querySelectorAll(".tower-cell")[idx].innerText = "✅";
            currentMultiplier = 1 + (towerCells.filter(c=>c.revealed).length * 0.2);
            document.getElementById("towerMultiplier").innerHTML = `x${currentMultiplier.toFixed(1)}`;
            if(towerCells.filter(c=>c.revealed).length >= 7) {
                let win = towerBetAmount * currentMultiplier;
                updateBalance(win);
                document.getElementById("towerStatus").innerHTML = `🎉 ПОБЕДА! +${win.toFixed(2)} TON`;
                towerGameActive = false;
                document.getElementById("startTowerBtn").style.display = "block";
                document.getElementById("cashoutTowerBtn").style.display = "none";
            }
        }
    }
    
    document.getElementById("cashoutTowerBtn").onclick = async () => {
        if(!towerGameActive) return;
        let win = towerBetAmount * currentMultiplier;
        await updateBalance(win);
        document.getElementById("towerStatus").innerHTML = `💎 Выигрыш забран! +${win.toFixed(2)} TON`;
        towerGameActive = false;
        document.getElementById("startTowerBtn").style.display = "block";
        document.getElementById("cashoutTowerBtn").style.display = "none";
    };
    
    // Техподдержка
    document.getElementById("supportBtn").onclick = () => {
        let box = document.getElementById("supportChatBox");
        box.style.display = box.style.display === "none" ? "block" : "none";
        loadSupportMessages();
    };
    
    async function loadSupportMessages() {
        const msgsRef = ref(db, `support/${currentUser.id}`);
        onValue(msgsRef, (snap) => {
            let container = document.getElementById("supportMessages");
            container.innerHTML = "";
            snap.forEach(child => {
                let msg = child.val();
                let div = document.createElement("div");
                div.className = "support-msg";
                div.innerHTML = `<b>${msg.from}</b>: ${msg.text}<br><small>${new Date(msg.time).toLocaleTimeString()}</small>`;
                container.appendChild(div);
            });
        });
    }
    
    document.getElementById("sendSupportMsg").onclick = async () => {
        let text = document.getElementById("supportMsgInput").value;
        if(!text) return;
        await push(ref(db, `support/${currentUser.id}`), { from: currentUser.username, text: text, time: Date.now() });
        document.getElementById("supportMsgInput").value = "";
        if(userData.isAdmin || userData.isSupport) await push(ref(db, "adminTickets"), { userId: currentUser.id, msg: text });
    };
    
    async function loadTickets() {
        if(!userData.isAdmin) return;
        onValue(ref(db, "adminTickets"), (snap) => {
            let div = document.getElementById("ticketsList");
            div.innerHTML = "";
            snap.forEach(t => {
                let ticket = t.val();
                div.innerHTML += `<div class="support-msg">${ticket.userId}: ${ticket.msg} <button class="btn" style="width:auto; padding:5px;" onclick="replyToTicket('${ticket.userId}')">Ответить</button></div>`;
            });
        });
    }
    
    window.replyToTicket = async (userId) => {
        let reply = prompt("Ответ пользователю:");
        if(reply) await push(ref(db, `support/${userId}`), { from: "Админ", text: reply, time: Date.now() });
    };
    
    // Админ функции
    document.getElementById("giveGiftBtn").onclick = async () => {
        const users = await get(ref(db, "users"));
        users.forEach(async (u) => {
            await update(ref(db, `users/${u.key}`), { balance: (u.val().balance || 0) + 5 });
        });
        tg.showPopup({title:"Подарок", message:"+5 TON всем!"});
    };
    document.getElementById("grantVerifyBtn").onclick = async () => {
        let target = document.getElementById("adminTargetUser").value;
        const users = await get(ref(db, "users"));
        let found = false;
        users.forEach(async (u) => {
            if(u.val().username === target) { await update(ref(db, `users/${u.key}`), { verified: true }); found = true; }
        });
        tg.showPopup({message: found ? "Галочка выдана" : "Не найден"});
    };
    document.getElementById("makeAdminBtn").onclick = async () => {
        let target = document.getElementById("adminTargetUser").value;
        const users = await get(ref(db, "users"));
        users.forEach(async (u) => { if(u.val().username === target) await update(ref(db, `users/${u.key}`), { isAdmin: true }); });
    };
    document.getElementById("makeSupportBtn").onclick = async () => {
        let target = document.getElementById("adminTargetUser").value;
        const users = await get(ref(db, "users"));
        users.forEach(async (u) => { if(u.val().username === target) await update(ref(db, `users/${u.key}`), { isSupport: true }); });
    };
    
    // Табы
    document.querySelectorAll(".tab").forEach(tab => {
        tab.onclick = () => {
            let tabName = tab.dataset.tab;
            document.querySelectorAll(".game-container").forEach(cont => cont.classList.remove("active"));
            document.getElementById(tabName + "Tab").classList.add("active");
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
        };
    });
    
    initUser();
</script>
</body>
</html>
