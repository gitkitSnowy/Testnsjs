<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROOM ROLLS - LIVE ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. MODERN CLEAN DESIGN SYSTEM
           ========================================================================== */
        :root {
            --bg-main: #f5f7fa;
            --bg-card: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --accent-primary: #000000;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-light: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius-md: 16px;
            --radius-lg: 24px;
            --safe-top: env(safe-area-inset-top, 15px);
            --safe-bot: env(safe-area-inset-bottom, 15px);
        }

        /* Dark mode support - clean inversion */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #111827;
                --bg-card: #1f2937;
                --text-dark: #f9fafb;
                --text-gray: #9ca3af;
                --accent-primary: #ffffff;
                --border-light: #374151;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-main); color: var(--text-dark); overflow: hidden; display: flex; justify-content: center; }

        .app-core {
            width: 100%; max-width: 500px; height: 100vh;
            display: flex; flex-direction: column; position: relative;
            background: var(--bg-main);
        }

        /* ==========================================================================
           2. HEADER & NAVIGATION
           ========================================================================== */
        .topbar {
            padding: calc(var(--safe-top) + 10px) 20px 15px;
            background: var(--bg-card); border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 50; position: relative;
        }
        
        .brand { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        
        .user-balance-btn {
            background: var(--bg-main); border: 1px solid var(--border-light);
            padding: 8px 16px; border-radius: 50px;
            font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px;
            cursor: pointer; transition: 0.2s;
        }
        .user-balance-btn:active { transform: scale(0.95); }

        /* ==========================================================================
           3. MAIN LAYOUT & CARDS
           ========================================================================== */
        .content-area { flex: 1; overflow-y: auto; padding: 20px 20px 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }
        
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 24px; margin-bottom: 20px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
        }

        /* ==========================================================================
           4. ROLL ARENA (LIVE PVP) - PERFECT CIRCLES
           ========================================================================== */
        .arena-header { text-align: center; margin-bottom: 20px; }
        .arena-title { font-size: 14px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .arena-bank { font-size: 32px; font-weight: 900; margin-top: 5px; }

        .players-pool {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            margin-bottom: 30px; min-height: 80px;
        }
        
        /* THE CIRCULAR AVATARS */
        .player-avatar-wrap {
            width: 56px; height: 56px; border-radius: 50%;
            padding: 3px; border: 2px solid var(--accent-blue);
            position: relative; transition: all 0.3s;
        }
        .player-avatar-wrap img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
        }
        .player-chance {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); font-size: 10px; font-weight: 700;
            padding: 2px 6px; border-radius: 10px; border: 1px solid var(--border-light);
        }

        /* ROULETTE SLIDER */
        .roulette-container {
            width: 100%; height: 80px; background: var(--bg-main);
            border-radius: var(--radius-md); overflow: hidden;
            position: relative; margin-bottom: 20px; display: none;
            border: 1px solid var(--border-light);
        }
        .roulette-track {
            display: flex; height: 100%; align-items: center; gap: 10px;
            padding-left: 50%; transition: transform 5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .roulette-item {
            width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid transparent;
        }
        .roulette-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .roulette-pointer {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 100%; background: var(--accent-red); z-index: 10;
        }

        /* CONTROLS */
        .input-box { background: var(--bg-main); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .input-box input { background: transparent; border: none; font-size: 20px; font-weight: 900; color: var(--text-dark); outline: none; width: 60%; }
        
        .btn {
            width: 100%; padding: 18px; border-radius: var(--radius-md); border: none;
            font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-black { background: var(--accent-primary); color: var(--bg-card); }
        .btn-black:active { transform: scale(0.97); opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); color: var(--text-dark); padding: 12px; }

        /* ==========================================================================
           5. PROFILE SECTION
           ========================================================================== */
        .prof-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .prof-avatar { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border-light); object-fit: cover; }
        .prof-info h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .prof-info p { color: var(--text-gray); font-size: 14px; }
        
        .tag { display: inline-block; padding: 4px 10px; background: var(--bg-main); border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 8px; border: 1px solid var(--border-light); }

        /* ==========================================================================
           6. BOTTOM NAVIGATION (CLEAN SVG)
           ========================================================================== */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: var(--bg-card); border-top: 1px solid var(--border-light);
            display: flex; padding: 10px 0 calc(var(--safe-bot) + 5px);
            z-index: 100;
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-gray); cursor: pointer; transition: 0.2s; }
        .nav-tab.active { color: var(--accent-primary); }
        .nav-tab svg { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 2; }
        .nav-tab span { font-size: 11px; font-weight: 700; }

        /* ==========================================================================
           7. ENTERPRISE ADMIN PANEL
           ========================================================================== */
        .admin-overlay {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 9999;
            display: none; flex-direction: column; padding: var(--safe-top) 0 0;
        }
        .admin-header { padding: 20px; background: var(--bg-card); border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .admin-title { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .admin-close { color: var(--accent-red); font-weight: 700; cursor: pointer; }
        .admin-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .admin-block { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 15px; margin-bottom: 15px; }
        .admin-block h3 { font-size: 12px; text-transform: uppercase; color: var(--text-gray); margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sys-log { background: #111; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; }

    </style>
</head>
<body>

<div class="app-core">

    <header class="topbar">
        <div class="brand">ROOM ROLLS</div>
        <div class="user-balance-btn" onclick="SYSTEM.checkAdminAccess()">
            <span id="ui-bal">0.00</span> <span>TON</span>
        </div>
    </header>

    <main class="content-area">

        <section id="tab-roll" class="view-section active">
            <div class="card">
                <div class="arena-header">
                    <div class="arena-title">LIVE ARENA BANK</div>
                    <div class="arena-bank" id="ui-bank">0.00</div>
                </div>

                <div class="players-pool" id="ui-players">
                    </div>

                <div class="roulette-container" id="ui-roulette">
                    <div class="roulette-pointer"></div>
                    <div class="roulette-track" id="ui-track"></div>
                </div>

                <div class="input-box">
                    <input type="number" id="inp-bet" value="10.00" step="0.1">
                    <span style="font-weight:700; color:var(--text-gray)">TON</span>
                </div>
                
                <button class="btn btn-black" id="btn-join" onclick="ROLL.joinRoom()">JOIN ROOM</button>
            </div>

            <div class="card">
                <h3 style="font-size: 14px; margin-bottom: 15px;">RECENT DROPS</h3>
                <div id="ui-history" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>
        </section>

        <section id="tab-pump" class="view-section">
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <h2 style="font-weight: 900; margin-bottom: 10px;">TON PUMP</h2>
                <p style="color: var(--text-gray); font-size: 14px;">Модуль переведен в фоновый режим.<br>Основной акцент на LIVE ROLLS.</p>
            </div>
        </section>

        <section id="tab-profile" class="view-section">
            <div class="card">
                <div class="prof-header">
                    <img id="prof-img" src="" class="prof-avatar" alt="User">
                    <div class="prof-info">
                        <h2 id="prof-name">Alexander</h2>
                        <p id="prof-uid">@Kegovich</p>
                        <div id="prof-tags"></div>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="btn-outline" style="text-align:center">GAMES: <b id="ui-games">0</b></div>
                    <div class="btn-outline" style="text-align:center">WON: <b id="ui-won">0</b></div>
                </div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-tab active" onclick="UI.switchTab('roll')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>ROLL</span>
        </div>
        <div class="nav-tab" onclick="UI.switchTab('pump')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span>PUMP</span>
        </div>
        <div class="nav-tab" onclick="UI.switchTab('profile')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span>PROFILE</span>
        </div>
    </nav>

    <div class="admin-overlay" id="admin-panel">
        <div class="admin-header">
            <div class="admin-title">
                <span style="width:10px;height:10px;background:var(--accent-green);border-radius:50%;display:inline-block;"></span>
                COMMAND CENTER
            </div>
            <div class="admin-close" onclick="ADMIN.close()">CLOSE</div>
        </div>
        <div class="admin-body">
            <div class="admin-block">
                <h3>System Logs</h3>
                <div class="sys-log" id="sys-log">
                    <div>> SYSTEM INITIALIZED</div>
                </div>
            </div>
            <div class="admin-block">
                <h3>Room Controls</h3>
                <div class="grid-2">
                    <button class="btn btn-outline" onclick="ADMIN.forceBot()">+ INJECT BOT</button>
                    <button class="btn btn-outline" style="color:var(--accent-red);border-color:var(--accent-red)" onclick="ADMIN.forceSpin()">FORCE SPIN</button>
                </div>
            </div>
            <div class="admin-block">
                <h3>User DB Actions (ID: @Kegovich)</h3>
                <div class="grid-2">
                    <button class="btn btn-black" onclick="ADMIN.addFunds(100)">+ 100 TON</button>
                    <button class="btn btn-black" onclick="ADMIN.addFunds(1000)">+ 1000 TON</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
/**
 * ============================================================================
 * CORE ENGINE: ROOM ROLLS (LIVE PVP ARCHITECTURE)
 * ============================================================================
 */

// 1. TELEGRAM API INIT
const tg = window.Telegram?.WebApp || null;

// 2. STATE MANAGER
const STATE = {
    user: {
        id: "0",
        username: "Guest",
        firstName: "Player",
        photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Base",
        balance: 500.00,
        stats: { games: 0, won: 0 }
    },
    room: {
        status: 'OPEN', // OPEN, SPINNING, CLOSED
        bank: 0,
        players: [], // Array of player objects
        timer: null
    }
};

// 3. UTILITIES
const UTILS = {
    formatMoney: (num) => parseFloat(num).toFixed(2),
    generateID: () => Math.random().toString(36).substr(2, 9),
    sleep: (ms) => new Promise(r => setTimeout(r, ms))
};

// 4. UI CONTROLLER (Clean handling of DOM)
const UI = {
    init() {
        if(tg) {
            tg.ready(); tg.expand();
            tg.setHeaderColor(window.matchMedia('(prefers-color-scheme: dark)').matches ? '#111827' : '#ffffff');
            
            const u = tg.initDataUnsafe?.user;
            if(u) {
                STATE.user.id = String(u.id);
                STATE.user.username = u.username || 'Guest';
                STATE.user.firstName = u.first_name;
                if(u.photo_url) STATE.user.photo = u.photo_url;
            }
        }
        this.updateGlobal();
        this.renderProfile();
    },

    switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        
        document.getElementById(`tab-${tabId}`).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    },

    updateGlobal() {
        document.getElementById('ui-bal').innerText = UTILS.formatMoney(STATE.user.balance);
        document.getElementById('ui-bank').innerText = UTILS.formatMoney(STATE.room.bank);
    },

    renderProfile() {
        document.getElementById('prof-img').src = STATE.user.photo;
        document.getElementById('prof-name').innerText = STATE.user.firstName;
        document.getElementById('prof-uid').innerText = `@${STATE.user.username}`;
        
        let tags = '';
        if(STATE.user.username.toLowerCase() === 'kegovich' || STATE.user.id === '6418873752') {
            tags += `<span class="tag" style="background:var(--accent-primary);color:var(--bg-card)">LEAD DEV</span> `;
            tags += `<span class="tag">Новости Кировская область</span>`;
        }
        document.getElementById('prof-tags').innerHTML = tags;
        
        document.getElementById('ui-games').innerText = STATE.user.stats.games;
        document.getElementById('ui-won').innerText = UTILS.formatMoney(STATE.user.stats.won);
    },

    renderPlayers() {
        const pool = document.getElementById('ui-players');
        if(STATE.room.players.length === 0) {
            pool.innerHTML = `<span style="color:var(--text-gray); font-size:14px; margin-top:20px;">Ожидание игроков...</span>`;
            return;
        }

        pool.innerHTML = STATE.room.players.map(p => {
            const chance = ((p.bet / STATE.room.bank) * 100).toFixed(1);
            // Strict circular avatar logic applied here
            return `
                <div class="player-avatar-wrap" style="border-color: ${p.color}">
                    <img src="${p.photo}" alt="${p.name}">
                    <div class="player-chance">${chance}%</div>
                </div>
            `;
        }).join('');
    }
};

// 5. LIVE ROLL MECHANICS (MOCK WEBSOCKET LOGIC)
const ROLL = {
    colors: ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'],
    
    joinRoom() {
        if(STATE.room.status !== 'OPEN') return alert("Комната закрыта, идет кручение!");
        
        const betInput = parseFloat(document.getElementById('inp-bet').value);
        if(isNaN(betInput) || betInput <= 0) return alert("Неверная сумма!");
        if(betInput > STATE.user.balance) return alert("Недостаточно средств!");

        // Deduct balance
        STATE.user.balance -= betInput;
        STATE.user.stats.games++;
        UI.updateGlobal();

        // Add to room (Self)
        this.addPlayerToRoom(STATE.user.id, STATE.user.firstName, STATE.user.photo, betInput, true);

        // Haptic
        if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        // Simulate network delay and other players joining (Mocking real WS)
        this.simulateLiveEnvironment();
    },

    addPlayerToRoom(id, name, photo, bet, isSelf = false) {
        // Check if player already in room to sum bets
        let existing = STATE.room.players.find(p => p.id === id);
        if(existing) {
            existing.bet += bet;
        } else {
            STATE.room.players.push({
                id: id,
                name: name,
                photo: photo,
                bet: bet,
                color: this.colors[STATE.room.players.length % this.colors.length],
                isSelf: isSelf
            });
        }
        
        STATE.room.bank += bet;
        UI.updateGlobal();
        UI.renderPlayers();
    },

    simulateLiveEnvironment() {
        // This function mocks a real backend connection where other live players drop in
        if(STATE.room.players.length === 1) {
            document.getElementById('btn-join').innerText = "WAITING FOR OPPONENTS...";
            document.getElementById('btn-join').disabled = true;
            
            // Randomly inject 1-3 mock players after a delay
            setTimeout(() => {
                if(STATE.room.status !== 'OPEN') return;
                const mockNames = ['CryptoKing', 'TON_Whale', 'Degen'];
                const mockBet = Math.floor(Math.random() * 50) + 10;
                this.addPlayerToRoom(UTILS.generateID(), mockNames[Math.floor(Math.random()*mockNames.length)], `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}`, mockBet);
                
                if(STATE.room.players.length >= 2) {
                    this.startCountdown();
                }
            }, 2000);
        }
    },

    startCountdown() {
        STATE.room.status = 'SPINNING';
        let btn = document.getElementById('btn-join');
        btn.style.background = 'var(--text-gray)';
        btn.innerText = "ROLLING...";
        
        setTimeout(() => this.executeSpin(), 1000);
    },

    async executeSpin() {
        const uiPool = document.getElementById('ui-players');
        const uiRoulette = document.getElementById('ui-roulette');
        const uiTrack = document.getElementById('ui-track');
        
        uiPool.style.display = 'none';
        uiRoulette.style.display = 'block';

        // Generate Ticket Array based on chances
        let tickets = [];
        STATE.room.players.forEach(p => {
            let count = Math.floor((p.bet / STATE.room.bank) * 100);
            for(let i=0; i<count; i++) tickets.push(p);
        });
        
        // Shuffle and build track (70 items for smooth scroll)
        tickets = tickets.sort(() => Math.random() - 0.5);
        let trackHTML = '';
        const trackLength = 70;
        const winnerIndex = 60; // Fixed index where it stops
        
        for(let i=0; i<trackLength; i++) {
            let p = tickets[i % tickets.length];
            trackHTML += `<div class="roulette-item" style="border-color:${p.color}"><img src="${p.photo}"></div>`;
        }
        uiTrack.innerHTML = trackHTML;

        // Animate
        uiTrack.style.transform = 'translateX(0)';
        uiTrack.style.transition = 'none';
        
        // Force reflow
        void uiTrack.offsetWidth;
        
        // The winning ticket
        const winner = tickets[winnerIndex % tickets.length];
        
        // Calculate offset (Item width 50px + gap 10px = 60px)
        const itemWidth = 60;
        const offset = (winnerIndex * itemWidth) - (itemWidth/2) + (Math.random() * 30 - 15);
        
        uiTrack.style.transition = 'transform 5s cubic-bezier(0.1, 0.9, 0.2, 1)';
        uiTrack.style.transform = `translateX(-${offset}px)`;

        await UTILS.sleep(5500); // Wait for spin to finish

        this.finishRound(winner);
    },

    finishRound(winner) {
        if(winner.isSelf) {
            STATE.user.balance += STATE.room.bank;
            STATE.user.stats.won += STATE.room.bank;
            if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            alert(`ВЫ ВЫИГРАЛИ ${STATE.room.bank.toFixed(2)} TON!`);
        } else {
            if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        // Add to history
        const hist = document.getElementById('ui-history');
        const row = document.createElement('div');
        row.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; background:var(--bg-main); padding:10px; border-radius:8px; border:1px solid var(--border-light);">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="${winner.photo}" style="width:24px; height:24px; border-radius:50%;">
                <span style="font-weight:700; font-size:12px;">${winner.name}</span>
            </div>
            <span style="font-weight:900;">${STATE.room.bank.toFixed(2)} TON</span>
        </div>`;
        hist.prepend(row);

        // Reset Room
        STATE.room.status = 'OPEN';
        STATE.room.bank = 0;
        STATE.room.players = [];
        
        document.getElementById('ui-roulette').style.display = 'none';
        document.getElementById('ui-players').style.display = 'flex';
        
        let btn = document.getElementById('btn-join');
        btn.style.background = 'var(--accent-primary)';
        btn.innerText = "JOIN ROOM";
        btn.disabled = false;

        UI.updateGlobal();
        UI.renderPlayers();
        UI.renderProfile();
    }
};

// 6. SYSTEM ADMIN OVERRIDE
const SYSTEM = {
    checkAdminAccess() {
        const uname = STATE.user.username.toLowerCase();
        if(uname === 'kegovich' || STATE.user.id === '6418873752') {
            ADMIN.open();
        }
    }
};

const ADMIN = {
    open() {
        document.getElementById('admin-panel').style.display = 'flex';
        this.log("AUTH SUCCESS: Welcome Lead Developer.");
    },
    close() { document.getElementById('admin-panel').style.display = 'none'; },
    log(msg) {
        const el = document.getElementById('sys-log');
        el.innerHTML += `<div>> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    },
    addFunds(amount) {
        STATE.user.balance += amount;
        UI.updateGlobal();
        this.log(`Injected ${amount} TON to internal balance.`);
    },
    forceBot() {
        if(STATE.room.status !== 'OPEN') return this.log("Cannot inject, round in progress.");
        ROLL.addPlayerToRoom(UTILS.generateID(), "SystemBot", "https://api.dicebear.com/7.x/avataaars/svg?seed=Bot", 50);
        this.log("Mock bot injected to pool.");
    },
    forceSpin() {
        if(STATE.room.players.length < 2) return this.log("Need at least 2 players to spin.");
        ROLL.startCountdown();
        this.close();
    }
};

// INITIALIZE
window.onload = () => {
    UI.init();
};

</script>
</body>
</html>
