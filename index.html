<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP GODMODE v19</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ================================================================
           STYLING ARCHITECTURE - "GODMODE" NEON BLACK
           ================================================================
        */
        :root {
            --p-bg: #030303;
            --p-panel: #0a0a0b;
            --p-card: #121214;
            --p-accent: #007aff;
            --p-accent-glow: rgba(0, 122, 255, 0.4);
            --p-gold: #ffcc00;
            --p-gold-glow: rgba(255, 204, 0, 0.3);
            --p-red: #ff3b30;
            --p-green: #28cd41;
            --p-border: rgba(255, 255, 255, 0.08);
            --p-text: #ffffff;
            --p-text-muted: #6e6e73;
            --p-kb-key: #1c1c1e;
            --p-glass: rgba(255, 255, 255, 0.03);
            --p-font-main: 'Inter', sans-serif;
            --p-font-logo: 'Orbitron', sans-serif;
            --p-transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* RESET & BASE */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            scrollbar-width: none;
        }

        ::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--p-bg);
            color: var(--p-text);
            font-family: var(--p-font-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center;
        }

        /* КАНВАС ДЛЯ ЧАСТИЦ */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        /* MAIN WRAPPER */
        .app-container {
            width: 100%; max-width: 480px;
            height: 100vh; position: relative;
            background: radial-gradient(circle at 50% 0%, #15151a 0%, #030303 100%);
            display: flex; flex-direction: column;
            z-index: 2; border-left: 1px solid var(--p-border); border-right: 1px solid var(--p-border);
        }

        /* TOP BAR */
        .app-header {
            padding: 25px 20px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--p-border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .u-avatar-wrap {
            width: 54px; height: 54px; border-radius: 18px;
            background: linear-gradient(135deg, var(--p-accent), #5e5ce6);
            padding: 2px; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .u-avatar-wrap img { width: 100%; height: 100%; border-radius: 16px; object-fit: cover; }
        .u-level-badge {
            position: absolute; bottom: -5px; right: -5px;
            background: var(--p-gold); color: #000; font-weight: 900;
            font-size: 10px; padding: 2px 6px; border-radius: 6px;
            border: 2px solid var(--p-bg);
        }

        .u-info { display: flex; flex-direction: column; }
        .u-name { font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }
        .u-status { font-size: 10px; color: var(--p-accent); font-weight: 700; text-transform: uppercase; }

        .header-right { text-align: right; }
        .bal-container {
            background: var(--p-card); border: 1px solid var(--p-border);
            padding: 8px 16px; border-radius: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }
        .bal-val { font-family: var(--p-font-logo); color: var(--p-gold); font-size: 18px; font-weight: 700; }
        .bal-sym { font-size: 10px; color: var(--p-text-muted); margin-left: 4px; }

        /* SCROLLER & VIEWS */
        .view-port {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: 180px; position: relative;
        }

        .view { display: none; width: 100%; opacity: 0; transform: translateY(20px); transition: var(--p-transition); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* CARDS */
        .glass-panel {
            background: var(--p-card); border: 1px solid var(--p-border);
            border-radius: 32px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }

        /* ------------------------------------------------------------
           ROLL MODULE - КРУГОВАЯ РУЛЕТКА 
           ------------------------------------------------------------
        */
        .roll-stage {
            width: 100%; aspect-ratio: 1; position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
        }

        .svg-engine {
            width: 100%; height: 100%; transform: rotate(-90deg);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.9));
        }

        .pie-slice { transition: all 1s var(--p-transition); stroke-width: 16; fill: none; }

        .roll-center-hub {
            position: absolute; width: 130px; height: 130px;
            background: radial-gradient(circle, #151518 0%, #000 100%);
            border-radius: 50%; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--p-border);
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 30px var(--p-accent-glow);
        }
        .timer-big { font-family: var(--p-font-logo); font-size: 46px; font-weight: 900; color: #fff; line-height: 1; }
        .timer-small { font-size: 11px; color: var(--p-accent); font-weight: 800; letter-spacing: 1px; }

        /* АВАТАРКИ ВНУТРИ КРУГА */
        .pie-markers-layer { position: absolute; inset: 0; pointer-events: none; }
        .player-pin {
            position: absolute; width: 38px; height: 38px; border-radius: 12px;
            border: 2px solid #fff; background: #000; overflow: hidden;
            transform: translate(-50%, -50%); transition: 0.8s var(--p-transition);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .player-pin img { width: 100%; height: 100%; object-fit: cover; }

        /* BET INTERFACE */
        .bet-input-wrap {
            background: #000; border: 1px solid var(--p-border);
            border-radius: 24px; padding: 22px; text-align: center;
            margin-bottom: 15px; position: relative;
        }
        .bet-val-display { font-family: var(--p-font-logo); font-size: 30px; color: var(--p-gold); }
        .bet-label { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--p-text-muted); }

        .btn-main {
            width: 100%; padding: 24px; border-radius: 24px; border: none;
            font-family: var(--p-font-logo); font-weight: 900; font-size: 17px;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-accent { background: var(--p-accent); color: #fff; box-shadow: 0 12px 30px var(--p-accent-glow); }
        .btn-accent:active { transform: scale(0.96); }
        .btn-accent:disabled { background: #1c1c1e; box-shadow: none; color: #444; }

        /* ------------------------------------------------------------
           TOWER MODULE 
           ------------------------------------------------------------
        */
        .tower-grid { display: grid; grid-template-rows: repeat(8, 1fr); gap: 14px; }
        .tower-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; opacity: 0.15; transition: 0.4s; }
        .tower-row.active { opacity: 1; }
        .tower-tile {
            height: 65px; background: #18181b; border-radius: 20px;
            border: 1px solid var(--p-border); display: flex; align-items: center; justify-content: center;
            font-size: 28px; transition: 0.3s;
        }
        .tower-tile.win { background: var(--p-green); color: #000; border: none; box-shadow: 0 0 30px var(--p-green); }
        .tower-tile.lose { background: var(--p-red); opacity: 0.5; border: none; }

        /* ------------------------------------------------------------
           CHAT & SOCIAL 
           ------------------------------------------------------------
        */
        .chat-container {
            height: 380px; background: #050506; border-radius: 28px;
            border: 1px solid var(--p-border); padding: 20px;
            display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
        }
        .chat-msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg-own { align-self: flex-end; }
        .msg-bubble { padding: 14px 18px; border-radius: 22px; font-size: 14px; line-height: 1.5; }
        .msg-own .msg-bubble { background: var(--p-accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg-bot .msg-bubble { background: #1c1c1f; color: #d1d1d6; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; font-weight: 800; color: var(--p-gold); margin-bottom: 4px; text-transform: uppercase; }

        /* ------------------------------------------------------------
           KEYBOARD OS 
           ------------------------------------------------------------
        */
        .os-kb {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #080808; border-top: 1px solid var(--p-border);
            padding: 10px 10px 45px; z-index: 10000;
            transition: bottom 0.5s var(--p-transition);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.9);
        }
        .os-kb.show { bottom: 0; }
        .kb-row { display: flex; justify-content: center; gap: 7px; margin-bottom: 10px; }
        .kb-key {
            background: var(--p-kb-key); height: 56px; flex: 1;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; font-weight: 500;
            border-bottom: 4px solid #000; transition: 0.1s;
        }
        .kb-key:active { transform: translateY(4px); border-bottom-width: 0; background: #333; }
        .kb-key.func { background: #2c2c2e; font-size: 13px; font-weight: 800; flex: 1.7; }
        .kb-key.space { flex: 5.5; }

        /* ------------------------------------------------------------
           NAVBAR 
           ------------------------------------------------------------
        */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: rgba(8,8,10,0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 18px 0 38px;
            border-top: 1px solid var(--p-border); z-index: 900;
        }
        .nav-btn { color: #444; text-align: center; transition: 0.3s; cursor: pointer; position: relative; }
        .nav-btn.active { color: var(--p-accent); }
        .nav-btn i { font-size: 26px; display: block; margin-bottom: 6px; font-style: normal; }
        .nav-btn span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ------------------------------------------------------------
           ROOT OVERLORD CONSOLE 
           ------------------------------------------------------------
        */
        .root-panel {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: none; flex-direction: column; padding: 40px 25px;
        }
        .root-scroll { flex: 1; overflow-y: auto; }
        .root-box { background: var(--p-card); border: 1px solid var(--p-border); border-radius: 28px; padding: 22px; margin-bottom: 22px; }
        .root-field { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-top: 12px; font-family: var(--p-font-logo); }
        .root-label { font-size: 11px; font-weight: 900; color: var(--p-accent); text-transform: uppercase; }

        /* NOTIFICATIONS */
        .toast {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: var(--p-accent); color: #fff; padding: 12px 24px;
            border-radius: 15px; font-weight: 800; font-size: 13px;
            z-index: 30000; box-shadow: 0 10px 30px var(--p-accent-glow);
            display: none; animation: toastIn 0.3s ease;
        }
        @keyframes toastIn { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <div class="u-avatar-wrap">
                    <img id="head-av" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Alex">
                    <div class="u-level-badge">LV.17</div>
                </div>
                <div class="u-info">
                    <span class="u-name" id="head-name">Alexander</span>
                    <span class="u-status" id="head-status">PROJECT OWNER</span>
                </div>
            </div>
            <div class="header-right">
                <div class="bal-container">
                    <span class="bal-val" id="head-bal">0.00</span>
                    <span class="bal-sym">TON</span>
                </div>
            </div>
        </header>

        <main class="view-port">
            
            <div id="v-roll" class="view active">
                <div class="glass-panel" style="background: transparent; border: none; box-shadow: none; padding: 0;">
                    <div class="roll-stage">
                        <svg class="svg-engine" viewBox="0 0 100 100" id="pie-svg">
                            </svg>
                        <div class="pie-markers-layer" id="pie-pins"></div>
                        <div class="roll-center-hub">
                            <div class="timer-big" id="roll-timer">15</div>
                            <div class="timer-small">WAITING</div>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-bottom:25px; padding: 0 10px;">
                        <div>
                            <p style="color:var(--p-text-muted); font-size:9px; font-weight:900;">BANK POOL</p>
                            <p style="color:var(--p-gold); font-family:var(--p-font-logo); font-size:24px;" id="roll-bank">0.00</p>
                        </div>
                        <div style="text-align:right;">
                            <p style="color:var(--p-text-muted); font-size:9px; font-weight:900;">PLAYERS</p>
                            <p style="font-family:var(--p-font-logo); font-size:24px;" id="roll-pcount">0</p>
                        </div>
                    </div>

                    <div class="glass-panel">
                        <div class="bet-label">ENTER STAKE</div>
                        <div class="bet-input-wrap" id="bet-field" onclick="sys.kbOpen('num', 'bet-field')">10.00</div>
                        <button class="btn-main btn-accent" id="btn-bet" onclick="game.rollJoin()">PLACE YOUR BET</button>
                    </div>
                </div>
            </div>

            <div id="v-tower" class="view">
                <div class="glass-panel">
                    <div class="tower-grid" id="tower-grid"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:30px;">
                        <button class="btn-main btn-accent" id="tw-btn-start" onclick="game.towerStart()">STAKE 5.0</button>
                        <button class="btn-main btn-accent" id="tw-btn-cash" style="display:none; background:var(--p-gold); color:#000;" onclick="game.towerCash()">CASH OUT</button>
                    </div>
                </div>
            </div>

            <div id="v-profile" class="view">
                <div class="glass-panel" style="margin-bottom:15px; padding:15px;">
                    <div style="display:flex; gap:10px;">
                        <button class="btn-main btn-accent" style="flex:1; height:45px; font-size:11px;" onclick="sys.chatMode('global')" id="chat-tab-g">GLOBAL</button>
                        <button class="btn-main btn-accent" style="flex:1; height:45px; font-size:11px; background:#1c1c1f;" onclick="sys.chatMode('support')" id="chat-tab-s">SUPPORT</button>
                    </div>
                </div>
                
                <div class="chat-container" id="chat-box"></div>
                
                <div style="display:flex; gap:12px; margin-top:15px;">
                    <div class="bet-input-wrap" id="chat-field" style="margin:0; text-align:left; font-family:'Inter'; font-size:15px; flex:1;" onclick="sys.kbOpen('alpha', 'chat-field')"></div>
                    <button class="btn-main btn-accent" style="width:65px; padding:0;" onclick="sys.chatSend()">></button>
                </div>

                <button class="btn-main" id="root-access-btn" style="background:var(--p-red); margin-top:30px; display:none;" onclick="root.show()">ROOT CONSOLE</button>
            </div>

        </main>

        <nav class="nav-bar">
            <div class="nav-btn active" onclick="sys.nav('roll', this)"><i>⚔️</i><span>Roll</span></div>
            <div class="nav-btn" onclick="sys.nav('tower', this)"><i>🏰</i><span>Tower</span></div>
            <div class="nav-btn" onclick="sys.nav('profile', this)"><i>👤</i><span>Profile</span></div>
        </nav>

        <div class="os-kb" id="kb-engine">
            <div style="display:flex; justify-content:space-between; padding:5px 15px 15px; align-items:center;">
                <span id="kb-id-tag" style="font-weight:900; color:var(--p-accent); font-size:11px; opacity:0.6;">V19_SYSTEM_IO</span>
                <div onclick="sys.kbClose()" style="color:var(--p-accent); font-weight:900; background:var(--p-accent-glow); padding:8px 18px; border-radius:12px;">CLOSE</div>
            </div>
            <div id="kb-render-zone"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="root-panel" id="root-ui">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 style="color:var(--p-red); font-family:var(--p-font-logo);">ROOT ACCESS</h1>
            <button onclick="root.hide()" class="kb-key" style="width:50px; flex:none; background:var(--p-red);">X</button>
        </div>
        <div class="root-scroll">
            <div class="root-box">
                <p class="root-label">Account Balance</p>
                <input type="number" id="adm-set-bal" class="root-field">
                <button class="btn-main btn-accent" style="margin-top:20px;" onclick="root.apply()">PATCH MEMORY</button>
            </div>
            <div class="root-box">
                <p class="root-label">Tower Win Rate (%)</p>
                <input type="range" id="adm-rtp-range" min="0" max="100" style="width:100%; margin:20px 0;">
                <div id="rtp-preview" style="text-align:center; font-family:var(--p-font-logo); font-size:28px;">45%</div>
            </div>
            <div class="root-box">
                <p class="root-label">System Logs</p>
                <div id="root-logs" style="font-size:10px; font-family:monospace; color:#34c759; margin-top:10px; max-height:100px; overflow:y:auto;">
                    > SYSTEM BOOTED V19.0.4...<br>
                    > AUTHENTICATED: ALEXANDER...
                </div>
            </div>
        </div>
    </div>

<script>
/* ================================================================
   GODMODE ENGINE CORE - V19.0.4 "TITAN"
   ================================================================
*/

const tg = window.Telegram.WebApp;

// DATA STORE
const APP = {
    u: { name: "Alexander", id: "6418873752", bal: 5000.0, av: "", status: "DEVELOPER" },
    roll: { timer: 15, bank: 0, players: [], myBet: 0, active: true },
    tower: { active: false, floor: 0, rtp: 45 },
    chat: { mode: 'global', g: [], s: [] },
    kb: { target: null, lang: 'ru', caps: false, mode: 'alpha' },
    particles: []
};

const CHARSETS = {
    ru: [
        ["й","ц","у","к","е","н","г","ш","щ","з","х"],
        ["ф","ы","в","а","п","р","о","л","д","ж","э"],
        ["⇧","я","ч","с","м","и","т","ь","б","ю","⌫"],
        ["🌐",","," ",".","↩"]
    ],
    en: [
        ["q","w","e","r","t","y","u","i","o","p"],
        ["a","s","d","f","g","h","j","k","l"],
        ["⇧","z","x","c","v","b","n","m","⌫"],
        ["🌐",","," ",".","↩"]
    ],
    num: [["1","2","3"],["4","5","6"],["7","8","9"],[".","0","⌫"]]
};

const sys = {
    // НАВИГАЦИЯ
    nav(v, el) {
        document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
        document.getElementById('v-'+v).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(v === 'tower') game.towerInit();
        this.sync();
        tg.HapticFeedback.impactOccurred('medium');
    },

    // ОБНОВЛЕНИЕ ДАННЫХ
    sync() {
        document.getElementById('head-bal').innerText = APP.u.bal.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('head-name').innerText = APP.u.name;
        if(APP.u.av) document.getElementById('head-av').src = APP.u.av;
    },

    // КЛАВИАТУРА
    kbOpen(mode, target) {
        APP.kb.mode = mode; APP.kb.target = document.getElementById(target);
        document.getElementById('kb-engine').classList.add('show');
        this.kbRender();
    },
    kbClose() { document.getElementById('kb-engine').classList.remove('show'); },
    kbRender() {
        const zone = document.getElementById('kb-render-zone');
        const layout = APP.kb.mode === 'num' ? CHARSETS.num : CHARSETS[APP.kb.lang];
        zone.innerHTML = layout.map(row => `
            <div class="kb-row">
                ${row.map(k => {
                    let cls = "kb-key", lbl = k, act = `sys.kbType('${k}')`;
                    if(k === "⇧") { cls += " func"; act = "sys.kbCaps()"; }
                    if(k === "⌫") { cls += " func"; lbl = "DEL"; act = "sys.kbBack()"; }
                    if(k === "🌐") { cls += " func"; lbl = "RU/EN"; act = "sys.kbLang()"; }
                    if(k === " ") { cls += " space"; lbl = "SPACE"; }
                    if(k === "↩") { cls += " func"; lbl = "ENTER"; act = "sys.kbClose()"; }
                    if(APP.kb.caps && k.length === 1 && k !== " " && k !== "." && k !== ",") lbl = k.toUpperCase();
                    return `<div class="${cls}" onclick="${act}">${lbl}</div>`;
                }).join('')}
            </div>
        `).join('');
    },
    kbType(k) {
        if(["⇧","⌫","🌐","↩"].includes(k)) return;
        const char = APP.kb.caps ? k.toUpperCase() : k;
        APP.kb.target.innerText += char;
        tg.HapticFeedback.impactOccurred('light');
    },
    kbBack() { APP.kb.target.innerText = APP.kb.target.innerText.slice(0,-1); },
    kbCaps() { APP.kb.caps = !APP.kb.caps; this.kbRender(); },
    kbLang() { APP.kb.lang = APP.kb.lang === 'ru' ? 'en' : 'ru'; this.kbRender(); },

    // ЧАТ
    chatMode(m) {
        APP.chat.mode = m;
        document.getElementById('chat-tab-g').style.background = m === 'global' ? 'var(--p-accent)' : '#1c1c1f';
        document.getElementById('chat-tab-s').style.background = m === 'support' ? 'var(--p-accent)' : '#1c1c1f';
        this.chatRender();
    },
    chatSend() {
        const inp = document.getElementById('chat-field');
        if(!inp.innerText.trim()) return;
        const msg = { name: APP.u.name, txt: inp.innerText, own: true };
        if(APP.chat.mode === 'global') APP.chat.g.push(msg); else APP.chat.s.push(msg);
        inp.innerText = ''; this.chatRender();
        tg.HapticFeedback.notificationOccurred('success');
    },
    chatRender() {
        const box = document.getElementById('chat-box');
        const data = APP.chat.mode === 'global' ? APP.chat.g : APP.chat.s;
        box.innerHTML = data.map(m => `
            <div class="chat-msg ${m.own ? 'msg-own' : 'msg-bot'}">
                <span class="msg-meta">${m.name}</span>
                <div class="msg-bubble">${m.txt}</div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    },

    toast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
};

const game = {
    // ROLL LOGIC
    rollInit() {
        setInterval(() => {
            if(!APP.roll.active) return;
            APP.roll.timer--;
            
            // Имитация захода игроков
            if(APP.roll.timer > 3 && Math.random() > 0.75) this.botEntry();

            if(APP.roll.timer <= 0) {
                this.rollResolve();
                APP.roll.timer = 15;
                APP.roll.myBet = 0;
                APP.roll.players = [];
                APP.roll.bank = 0;
                document.getElementById('btn-bet').disabled = false;
            }
            
            document.getElementById('roll-timer').innerText = APP.roll.timer;
            document.getElementById('roll-bank').innerText = APP.roll.bank.toFixed(2);
            document.getElementById('roll-pcount').innerText = APP.roll.players.length;
            this.rollDraw();
        }, 1000);
    },

    botEntry() {
        const bots = ["KitsaKega", "TonWhale", "CryptoKing", "Mamba_Dev", "DarkAmbient", "Shadow"];
        const bid = Math.floor(Math.random()*8999)+1000;
        const bamt = Math.floor(Math.random()*100)+5;
        APP.roll.players.push({
            name: bots[Math.floor(Math.random()*bots.length)],
            id: bid, bet: bamt, 
            av: `https://api.dicebear.com/7.x/identicon/svg?seed=${bid}`,
            me: false
        });
        APP.roll.bank += bamt;
    },

    rollJoin() {
        const amt = parseFloat(document.getElementById('bet-field').innerText);
        if(amt > 0 && APP.u.bal >= amt && APP.roll.myBet === 0) {
            APP.u.bal -= amt;
            APP.roll.myBet = amt;
            APP.roll.bank += amt;
            APP.roll.players.push({
                name: APP.u.name, id: APP.u.id, bet: amt, av: APP.u.av, me: true
            });
            document.getElementById('btn-bet').disabled = true;
            sys.sync();
            tg.HapticFeedback.notificationOccurred('success');
            sys.toast("BET PLACED!");
        }
    },

    rollDraw() {
        const svg = document.getElementById('pie-svg');
        const pins = document.getElementById('pie-pins');
        svg.innerHTML = ''; pins.innerHTML = '';
        
        if(APP.roll.players.length === 0) {
            svg.innerHTML = `<circle cx="50" cy="50" r="40" stroke="#1c1c1e" stroke-width="16" fill="none" />`;
            return;
        }

        let currentAngle = 0;
        const palette = ["#007aff", "#5e5ce6", "#ffcc00", "#ff3b30", "#28cd41", "#af52de", "#ff9500"];

        APP.roll.players.forEach((p, idx) => {
            const ratio = p.bet / APP.roll.bank;
            const angle = ratio * 360;
            const dash = `${ratio * 251.2} 251.2`;
            const offset = -(currentAngle / 360) * 251.2;

            const slice = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            slice.setAttribute("cx", "50");
            slice.setAttribute("cy", "50");
            slice.setAttribute("r", "40");
            slice.classList.add("pie-slice");
            slice.style.stroke = p.me ? "var(--p-accent)" : palette[idx % palette.length];
            slice.style.strokeDasharray = dash;
            slice.style.strokeDashoffset = offset;
            if(p.me) slice.style.filter = "drop-shadow(0 0 5px var(--p-accent))";
            svg.appendChild(slice);

            // МАРКЕРЫ (АВАТАРКИ)
            const midAngle = (currentAngle + angle / 2) * (Math.PI / 180);
            const radius = 40;
            const px = 50 + radius * Math.cos(midAngle - Math.PI/2);
            const py = 50 + radius * Math.sin(midAngle - Math.PI/2);

            const pin = document.createElement('div');
            pin.className = 'player-pin';
            if(p.me) { pin.style.borderColor = 'var(--p-gold)'; pin.style.zIndex = '100'; }
            pin.style.left = px + '%';
            pin.style.top = py + '%';
            pin.innerHTML = `<img src="${p.av}">`;
            pins.appendChild(pin);

            currentAngle += angle;
        });
    },

    rollResolve() {
        if(APP.roll.myBet > 0) {
            const winRatio = APP.roll.myBet / APP.roll.bank;
            if(Math.random() < winRatio) {
                const total = APP.roll.bank * 0.95;
                APP.u.bal += total;
                sys.toast(`WINNER! +${total.toFixed(2)} TON`);
                fx.spawnExplosion();
            }
        }
        sys.sync();
    },

    // TOWER
    towerInit() {
        const g = document.getElementById('tower-grid'); g.innerHTML = '';
        for(let i=7; i>=0; i--) {
            g.innerHTML += `<div class="tower-row" id="tw-row-${i}">
                <div class="tower-tile" onclick="game.towerStep(${i},0)">?</div>
                <div class="tower-tile" onclick="game.towerStep(${i},1)">?</div>
                <div class="tower-tile" onclick="game.towerStep(${i},2)">?</div>
            </div>`;
        }
    },
    towerStart() {
        if(APP.u.bal < 5) return;
        APP.u.bal -= 5; APP.tower.active = true; APP.tower.floor = 0;
        document.getElementById('tw-btn-start').style.display = 'none';
        document.getElementById('tw-btn-cash').style.display = 'block';
        this.towerUpdate(); sys.sync();
    },
    towerUpdate() {
        document.querySelectorAll('.tower-row').forEach(r => r.classList.remove('active'));
        document.getElementById('tw-row-'+APP.tower.floor).classList.add('active');
    },
    towerStep(f, t) {
        if(!APP.tower.active || f !== APP.tower.floor) return;
        const win = (Math.random() * 100) < APP.tower.rtp;
        const tiles = document.getElementById('tw-row-'+f).children;
        if(win) {
            tiles[t].classList.add('win');
            APP.tower.floor++;
            tg.HapticFeedback.impactOccurred('light');
            if(APP.tower.floor > 7) this.towerCash(); else this.towerUpdate();
        } else {
            tiles[t].classList.add('lose');
            APP.tower.active = false;
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => this.towerInit(), 1000);
        }
    },
    towerCash() {
        const multipliers = [1.45, 2.9, 6.2, 14, 35, 90, 210, 500];
        const prize = 5 * multipliers[APP.tower.floor-1];
        APP.u.bal += prize;
        sys.toast(`CASHED: ${prize} TON`);
        APP.tower.active = false;
        document.getElementById('tw-btn-start').style.display = 'block';
        document.getElementById('tw-btn-cash').style.display = 'none';
        this.towerInit(); sys.sync();
        fx.spawnExplosion();
    }
};

const fx = {
    canvas: null, ctx: null,
    init() {
        this.canvas = document.getElementById('particle-canvas');
        this.ctx = this.canvas.getContext('2d');
        window.onresize = () => {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        };
        window.onresize();
        this.loop();
    },
    spawnExplosion() {
        for(let i=0; i<50; i++) {
            APP.particles.push({
                x: window.innerWidth/2, y: window.innerHeight/2,
                vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                life: 1, color: Math.random() > 0.5 ? '#ffcc00' : '#007aff',
                size: Math.random()*4+2
            });
        }
    },
    loop() {
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
        APP.particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
            this.ctx.globalAlpha = p.life;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            this.ctx.fill();
            if(p.life <= 0) APP.particles.splice(idx, 1);
        });
        requestAnimationFrame(() => this.loop());
    }
};

const root = {
    show() {
        document.getElementById('root-ui').style.display = 'flex';
        document.getElementById('adm-set-bal').value = APP.u.bal;
    },
    hide() { document.getElementById('root-ui').style.display = 'none'; },
    apply() {
        APP.u.bal = parseFloat(document.getElementById('adm-set-bal').value);
        sys.sync(); sys.toast("MEMORY PATCHED");
        this.hide();
    }
};

document.getElementById('adm-rtp-range').oninput = function() {
    APP.tower.rtp = this.value;
    document.getElementById('rtp-preview').innerText = this.value + '%';
};

// INITIALIZATION
window.onload = () => {
    tg.ready(); tg.expand();
    if(tg.initDataUnsafe?.user) {
        const user = tg.initDataUnsafe.user;
        APP.u.name = user.first_name;
        APP.u.id = String(user.id);
        APP.u.av = user.photo_url || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${user.id}`;
        if(user.id === 6418873752 || user.username === 'Kegovich') {
            document.getElementById('root-access-btn').style.display = 'block';
        }
    }
    sys.sync(); game.rollInit(); game.towerInit(); fx.init();
};
