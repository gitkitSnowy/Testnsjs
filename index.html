<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP Elite</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(20, 24, 40, 0.8);
            --accent: #2481cc;
            --gold: #ffcc00;
            --red: #ff4757;
            --green: #2ed573;
            --text: #ffffff;
            --sub: #a0a0ab;
            --grad: linear-gradient(135deg, #2481cc 0%, #00d2ff 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); overflow: hidden; 
            background: radial-gradient(circle at top right, #1a2a44 0%, #05070a 100%);
            height: 100vh;
        }

        /* АНИМИРОВАННЫЙ ФОН */
        body::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(36,129,204,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite; z-index: -1;
        }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; position: relative; }

        /* HEADER */
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            border-radius: 0 0 20px 20px; z-index: 100;
        }
        .u-avatar { width: 45px; height: 45px; border-radius: 15px; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(36,129,204,0.3); }
        .bal-display { 
            background: rgba(0,0,0,0.3); padding: 10px 18px; border-radius: 15px; border: 1px solid var(--accent);
            box-shadow: inset 0 0 10px rgba(36,129,204,0.2);
        }

        /* SCREENS & ANIMATIONS */
        main { flex: 1; overflow-y: auto; padding: 20px 20px 100px; scroll-behavior: smooth; }
        .screen { display: none; transform: translateY(10px); opacity: 0; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .screen.active { display: block; transform: translateY(0); opacity: 1; }

        /* CARDS */
        .card {
            background: var(--panel); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px; padding: 20px; margin-bottom: 15px; transition: 0.3s;
        }
        .room-item:active { transform: scale(0.97); background: rgba(36,129,204,0.15); }

        /* BUTTONS */
        .btn-action {
            background: var(--grad); border: none; color: white; padding: 16px; border-radius: 18px;
            width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(36,129,204,0.4); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-action:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(36,129,204,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

        /* INPUTS */
        .input-fld {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 15px; font-size: 16px; margin-bottom: 12px;
            transition: 0.3s; outline: none;
        }
        .input-fld:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(36,129,204,0.2); }

        /* WHEEL */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        .wheel-shadow { 
            position: absolute; inset: -10px; border-radius: 50%; 
            background: radial-gradient(circle, rgba(36,129,204,0.2) 0%, transparent 70%); 
        }
        canvas#mainWheel { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* NAVBAR */
        nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 460px;
            background: rgba(20, 24, 40, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-btn { color: var(--sub); text-align: center; font-size: 11px; font-weight: 600; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); transform: translateY(-3px); }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 4px; font-style: normal; }

        /* MODAL */
        .modal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; padding: 30px 20px; 
            display: none; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* TICKETS & ROWS */
        .ticket-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="my-avatar" class="u-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=K">
            <div>
                <div style="font-weight:900; display:flex; align-items:center; gap:4px;">
                    <span id="my-name">@User</span><span id="verif-icon" style="color:#00c3ff; display:none;">💎</span>
                </div>
                <div id="my-rank" style="font-size:10px; color:var(--accent); font-weight:700; letter-spacing:1px;">USER</div>
            </div>
        </div>
        <div class="bal-display">
            <span id="my-bal" style="font-weight:900; color:var(--gold); font-size:18px;">0.00</span> <small>TON</small>
        </div>
    </header>

    <main>
        <div id="scr-lobby" class="screen active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; font-size:24px;">Игровые залы</h2>
                <div style="width:40px; height:40px; background:var(--panel); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="nav('create')">＋</div>
            </div>
            
            <div class="card room-item" style="background: linear-gradient(90deg, rgba(255,204,0,0.1) 0%, var(--panel) 100%); border-left: 4px solid var(--gold);" onclick="joinRoom(0)">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:18px;">ГЛОБАЛЬНЫЙ ЗАЛ</b><br><small style="color:var(--sub);">Без ограничений по игрокам</small></div>
                    <div style="color:var(--gold); font-weight:900;">LIVE</div>
                </div>
            </div>
            
            <div id="rooms-list"></div>
        </div>

        <div id="scr-create" class="screen">
            <h2 style="margin-bottom:20px;">Настроить лобби</h2>
            <div class="card">
                <label style="font-size:12px; color:var(--sub); margin-left:5px;">КОЛИЧЕСТВО МЕСТ</label>
                <select id="c-players" class="input-fld">
                    <option value="2">2 Игрока (Дуэль)</option>
                    <option value="3">3 Игрока</option>
                    <option value="4" selected>4 Игрока (Квартет)</option>
                </select>

                <label style="font-size:12px; color:var(--sub); margin-left:5px;">ПАРОЛЬ (ОСТАВЬТЕ ПУСТЫМ ДЛЯ ВСЕХ)</label>
                <input type="password" id="c-pass" class="input-fld" placeholder="****">

                <label style="font-size:12px; color:var(--sub); margin-left:5px;">СТАВКА ВХОДА (TON)</label>
                <input type="number" id="c-bet" class="input-fld" value="1.0" min="0.1" step="0.1">

                <button class="btn-action" onclick="processCreateRoom()">СОЗДАТЬ ЛОББИ</button>
                <button class="btn-action btn-secondary" style="margin-top:10px;" onclick="nav('lobby')">НАЗАД</button>
            </div>
        </div>

        <div id="scr-game" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="leaveRoom()" style="background:none; border:none; color:var(--text); font-size:24px;">✕</button>
                <h3 id="game-title" style="margin:0;">ЗАЛ #1</h3>
                <div style="width:24px;"></div>
            </div>

            <div id="game-status" style="text-align:center; color:var(--gold); font-weight:800; margin:15px 0; text-transform:uppercase; letter-spacing:2px;">ОЖИДАНИЕ...</div>

            <div class="wheel-container">
                <div class="wheel-shadow"></div>
                <div style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); z-index:10; font-size:24px;">▼</div>
                <canvas id="mainWheel" width="600" height="600"></canvas>
            </div>

            <div id="game-players" class="card" style="padding:10px;">
                <div style="text-align:center; color:var(--sub); font-size:12px;">Ставок пока нет</div>
            </div>

            <div class="card" style="margin-top:10px;">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="play-bet" class="input-fld" style="margin-bottom:0; flex:1; text-align:center;" value="1.0">
                    <button class="btn-action" style="flex:2; margin-top:0;" onclick="placeBet()">СТАВИТЬ</button>
                </div>
            </div>
        </div>

        <div id="scr-profile" class="screen">
            <div style="text-align:center; margin-bottom:25px;">
                <img id="prof-img" class="u-avatar" style="width:90px; height:90px; border-radius:25px;" src="">
                <h2 id="prof-name" style="margin:10px 0 5px;">@User</h2>
                <div id="ton-connect-button" style="display:flex; justify-content:center; margin-top:15px;"></div>
            </div>

            <div class="card">
                <h4 style="margin:0 0 15px;">ПРОМОКОД</h4>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="promo-input" class="input-fld" style="margin-bottom:0;" placeholder="Введите код">
                    <button class="btn-action" style="width:auto; margin-top:0; padding:0 20px;" onclick="activatePromo()">OK</button>
                </div>
            </div>

            <div class="card">
                <h4 style="margin:0 0 15px;">ТЕХПОДДЕРЖКА</h4>
                <textarea id="support-msg" class="input-fld" placeholder="Опишите проблему или баг..."></textarea>
                <button class="btn-action btn-secondary" onclick="sendTicket()">ОТПРАВИТЬ ТИКЕТ</button>
            </div>

            <button id="adm-btn" class="btn-action" style="background:var(--gold); color:#000; display:none; margin-top:10px;" onclick="openAdmin()">АДМИН ПАНЕЛЬ</button>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="nav('lobby')"><i>🏟️</i>Лобби</div>
        <div class="nav-btn" onclick="nav('profile')"><i>💎</i>Профиль</div>
    </nav>
</div>

<div id="modal-admin" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="color:var(--gold); margin:0;">CONTROL CENTER</h2>
        <button onclick="document.getElementById('modal-admin').style.display='none'" style="background:none; border:none; color:white; font-size:30px;">✕</button>
    </div>

    <div class="card">
        <h4 style="margin-top:0;">ПРАВА И ГАЛОЧКИ</h4>
        <input id="adm-user" class="input-fld" placeholder="@username">
        <select id="adm-role" class="input-fld">
            <option value="VERIF">ВЫДАТЬ ГАЛОЧКУ</option>
            <option value="ADMIN">НАЗНАЧИТЬ АДМИНА</option>
            <option value="BAN">ЗАБАНИТЬ</option>
            <option value="USER">ОБЫЧНЫЙ ЮЗЕР</option>
        </select>
        <button class="btn-action" onclick="setRights()">ОБНОВИТЬ ПРАВА</button>
    </div>

    <div class="card">
        <h4 style="margin-top:0;">ГЕНЕРАЦИЯ ПРОМО</h4>
        <input id="new-promo-name" class="input-fld" placeholder="КОД (например: MASISA)">
        <input id="new-promo-sum" type="number" class="input-fld" placeholder="Сумма в TON">
        <button class="btn-action" style="background:var(--green);" onclick="createPromo()">СОЗДАТЬ</button>
    </div>

    <div class="card">
        <h4 style="margin-top:0;">АКТИВНЫЕ ТИКЕТЫ</h4>
        <div id="admin-tickets"></div>
    </div>

    <button class="btn-action" style="background:var(--red);" onclick="adminAction('reload')">RESTART SERVER (WITH REFUND)</button>
    <button class="btn-action btn-secondary" style="margin-top:10px;" onclick="document.getElementById('modal-admin').style.display='none'">ВЕРНУТЬСЯ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const tonConnect = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/master/public/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // ПОЛНЫЕ ДАННЫЕ (НИЧЕГО НЕ УДАЛЕНО)
    let user = { name: "Guest", bal: 100.0, role: "user", verif: false };
    let rooms = [];
    let tickets = [];
    let promos = [{name: "START", sum: 5.0}];
    let currentRoomId = null;
    let gamePlayers = [];
    let isSpinning = false;
    let timerIv = null;

    function init() {
        tg.ready(); tg.expand();
        const data = tg.initDataUnsafe?.user;
        user.name = data?.username || "Kegovich";
        
        document.getElementById('my-name').innerText = "@" + user.name;
        document.getElementById('prof-name').innerText = "@" + user.name;
        const avatar = data?.photo_url || `https://api.dicebear.com/7.x/initials/svg?seed=${user.name}`;
        document.getElementById('my-avatar').src = avatar;
        document.getElementById('prof-img').src = avatar;

        // ПРАВА ВЛАДЕЛЬЦА
        if(user.name === "Kegovich" || user.name === "mas1sa") {
            user.role = "owner";
            user.verif = true;
            document.getElementById('adm-btn').style.display = 'block';
            document.getElementById('my-rank').innerText = "FOUNDER";
        }

        if(user.verif) document.getElementById('verif-icon').style.display = 'inline';

        updateUI();
        renderRooms();
        drawWheel();
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id === 'lobby') document.querySelectorAll('.nav-btn')[0].classList.add('active');
        if(id === 'profile') document.querySelectorAll('.nav-btn')[1].classList.add('active');
    }

    // ЛОГИКА ПРОМОКОДОВ
    function createPromo() {
        const n = document.getElementById('new-promo-name').value.toUpperCase();
        const s = parseFloat(document.getElementById('new-promo-sum').value);
        if(n && s > 0) {
            promos.push({name: n, sum: s});
            tg.showAlert(`Промокод ${n} на ${s} TON создан!`);
        }
    }

    function activatePromo() {
        const code = document.getElementById('promo-input').value.toUpperCase();
        const index = promos.findIndex(p => p.name === code);
        if(index !== -1) {
            user.bal += promos[index].sum;
            promos.splice(index, 1);
            updateUI();
            tg.showAlert("Бонус зачислен!");
            document.getElementById('promo-input').value = "";
        } else {
            tg.showAlert("Код недействителен");
        }
    }

    // ТЕХПОДДЕРЖКА
    function sendTicket() {
        const m = document.getElementById('support-msg').value;
        if(m.length < 5) return tg.showAlert("Опишите подробнее");
        tickets.push({user: user.name, msg: m, id: Date.now()});
        tg.showAlert("Тикет отправлен админам!");
        document.getElementById('support-msg').value = "";
    }

    // ПРАВА
    function setRights() {
        const target = document.getElementById('adm-user').value;
        const role = document.getElementById('adm-role').value;
        tg.showConfirm(`Вы уверены, что хотите применить ${role} для ${target}?`);
    }

    // КОМНАТЫ И ИГРА
    function renderRooms() {
        const list = document.getElementById('rooms-list');
        list.innerHTML = rooms.map(r => `
            <div class="card room-item" onclick="joinRoom(${r.id})">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>ЛОББИ #${r.id}</b> ${r.pass ? '🔒' : ''}<br><small>Вход от ${r.minBet} TON</small></div>
                    <div style="text-align:right;"><span style="color:var(--accent); font-weight:800;">${r.players.length}/${r.max}</span></div>
                </div>
            </div>
        `).join('');
    }

    function processCreateRoom() {
        const bet = parseFloat(document.getElementById('c-bet').value);
        if(bet < 0.1) return tg.showAlert("Мин. ставка 0.1");
        const r = {
            id: rooms.length + 1,
            max: parseInt(document.getElementById('c-players').value),
            minBet: bet,
            pass: document.getElementById('c-pass').value,
            players: []
        };
        rooms.push(r);
        renderRooms();
        nav('lobby');
    }

    function joinRoom(id) {
        const room = id === 0 ? {id: 0, max: 99, minBet: 0.1, pass: ""} : rooms.find(r => r.id === id);
        if(room.pass) {
            const p = prompt("Пароль:");
            if(p !== room.pass) return tg.showAlert("Неверно!");
        }
        currentRoomId = id;
        document.getElementById('game-title').innerText = id === 0 ? "ГЛОБАЛЬНЫЙ ЗАЛ" : `ЛОББИ #${id}`;
        document.getElementById('play-bet').value = room.minBet;
        nav('game');
        updateGameUI();
    }

    function placeBet() {
        const v = parseFloat(document.getElementById('play-bet').value);
        const room = currentRoomId === 0 ? {minBet: 0.1, max: 99} : rooms.find(r => r.id === currentRoomId);

        if(v <= 0 || isNaN(v)) return tg.showAlert("Ошибка ставки");
        if(user.bal < v) return tg.showAlert("Мало TON");
        if(gamePlayers.length >= room.max) return tg.showAlert("Мест нет");

        user.bal -= v;
        gamePlayers.push({name: user.name, bet: v, color: '#2481cc', avatar: document.getElementById('my-avatar').src});
        updateUI(); updateGameUI();
        
        if(gamePlayers.length >= 2 && !timerIv) startTimer();
    }

    function startTimer() {
        let s = 10;
        timerIv = setInterval(() => {
            document.getElementById('game-status').innerText = `СТАРТ ЧЕРЕЗ ${s} СЕК`;
            if(s <= 0) { clearInterval(timerIv); timerIv = null; spin(); }
            s--;
        }, 1000);
    }

    function spin() {
        if(isSpinning) return;
        isSpinning = true;
        const deg = 3600 + Math.random() * 360;
        document.getElementById('mainWheel').style.transform = `rotate(${deg}deg)`;

        setTimeout(() => {
            const total = gamePlayers.reduce((a, b) => a + b.bet, 0);
            const win = gamePlayers[Math.floor(Math.random()*gamePlayers.length)];
            tg.showAlert(`ПОБЕДИТЕЛЬ: ${win.name}\nВЫИГРЫШ: ${total.toFixed(2)} TON`);
            if(win.name === user.name) user.bal += total;
            
            // Сброс
            isSpinning = false;
            gamePlayers = [];
            document.getElementById('mainWheel').style.transform = `rotate(0deg)`;
            document.getElementById('game-status').innerText = "ОЖИДАНИЕ...";
            updateUI(); updateGameUI();
        }, 6500);
    }

    function updateUI() { document.getElementById('my-bal').innerText = user.bal.toFixed(2); }

    function updateGameUI() {
        drawWheel();
        const list = document.getElementById('game-players');
        if(gamePlayers.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--sub); font-size:12px;">Ставок пока нет</div>`;
            return;
        }
        list.innerHTML = gamePlayers.map(p => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span>@${p.name}</span>
                <b style="color:var(--gold);">${p.bet} TON</b>
            </div>
        `).join('');
    }

    function drawWheel() {
        const canvas = document.getElementById('mainWheel');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,600,600);
        if(gamePlayers.length === 0) {
            ctx.beginPath(); ctx.fillStyle = "#141828"; ctx.arc(300,300,280,0,Math.PI*2); ctx.fill();
            return;
        }
        let start = 0;
        const total = gamePlayers.reduce((a, b) => a + b.bet, 0);
        gamePlayers.forEach(p => {
            const slice = (p.bet/total) * Math.PI * 2;
            ctx.beginPath(); ctx.fillStyle = p.color; ctx.moveTo(300,300);
            ctx.arc(300,300,280,start,start+slice); ctx.fill();
            start += slice;
        });
    }

    function openAdmin() {
        document.getElementById('modal-admin').style.display = 'block';
        const container = document.getElementById('admin-tickets');
        container.innerHTML = tickets.length ? tickets.map(t => `
            <div class="ticket-item">
                <b>@${t.user}:</b> ${t.msg}
            </div>
        `).join('') : "Тикетов нет";
    }

    function leaveRoom() {
        if(timerIv) clearInterval(timerIv);
        timerIv = null;
        currentRoomId = null;
        gamePlayers = [];
        nav('lobby');
    }

    function adminAction(type) {
        if(type === 'reload') {
            gamePlayers.forEach(p => { if(p.name === user.name) user.bal += p.bet; });
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
