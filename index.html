<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rolls Master PvP ELITE v11</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #020408;
            --panel: rgba(17, 25, 40, 0.75);
            --accent: #2481cc;
            --accent-glow: rgba(36, 129, 204, 0.4);
            --gold: #ffcc00;
            --text: #ffffff;
            --sub-text: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #112240 0%, #020408 100%);
        }

        .app-shell { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

        /* HEADER */
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .av-wrap { position: relative; width: 48px; height: 48px; }
        .av-wrap img { width: 100%; height: 100%; border-radius: 14px; border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .lvl-tag { 
            position: absolute; bottom: -6px; right: -6px; background: var(--accent); 
            font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 900; border: 2px solid #020408;
        }

        /* PROGRESS BAR */
        .xp-container { margin-top: 5px; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #5db3f3); transition: width 0.5s ease; }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 15px 15px 110px; }
        .screen { display: none; animation: slideUp 0.3s ease-out; }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 28px; padding: 20px; margin-bottom: 15px;
            backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            font-weight: 900; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #1a5d93); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--sub-text); border: 1px solid var(--border); }
        .btn:active { transform: scale(0.97); }

        /* CHAT */
        .chat-wrap { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding-right: 5px; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 13px; max-width: 80%; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .msg-name { font-size: 9px; font-weight: 900; color: var(--gold); display: block; margin-bottom: 3px; }

        /* TOWER */
        .tower-grid { display: flex; flex-direction: column-reverse; gap: 6px; }
        .t-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; opacity: 0.15; transition: 0.3s; }
        .t-row.active { opacity: 1; transform: scale(1.02); }
        .t-tile { height: 48px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .t-tile.win { background: #2ed573; color: #000; box-shadow: 0 0 15px rgba(46, 213, 115, 0.4); }
        .t-tile.lose { background: #ff4757; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: var(--panel); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 10px 0 30px;
            border-top: 1px solid var(--border); z-index: 500;
        }
        .nav-link { color: var(--sub-text); font-size: 10px; font-weight: 800; cursor: pointer; text-align: center; opacity: 0.6; }
        .nav-link.active { color: var(--accent); opacity: 1; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 2px; font-style: normal; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 20px; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="user-info">
            <div class="av-wrap">
                <img id="h-av" src="">
                <div class="lvl-tag" id="h-lvl">1</div>
            </div>
            <div>
                <div id="h-name" style="font-weight: 900; font-size: 15px;">Alexander</div>
                <div class="xp-container"><div class="xp-bar" id="h-xp"></div></div>
            </div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 18px; font-weight: 900; color: var(--gold);" id="h-bal">0.00</div>
            <div style="font-size: 8px; color: var(--sub-text); letter-spacing: 1px;">TON COINS</div>
        </div>
    </header>

    <main>
        <div id="scr-lobby" class="screen active">
            <div class="card" onclick="ui.nav('game-tower')">
                <h2 style="margin:0;">🏰 Cyber Tower</h2>
                <p style="color:var(--sub-text); font-size:12px;">Рискни и поднимись на вершину.</p>
                <button class="btn btn-primary" style="margin-top:10px;">ИГРАТЬ</button>
            </div>
            <div class="card" onclick="ui.nav('profile')">
                <h2 style="margin:0;">💬 Общий Чат</h2>
                <p style="color:var(--sub-text); font-size:12px;">Общайся с игроками в реальном времени.</p>
                <button class="btn btn-secondary" style="margin-top:10px;">ОТКРЫТЬ</button>
            </div>
        </div>

        <div id="scr-profile" class="screen">
            <div class="card" style="text-align:center;">
                <img id="p-av" src="" style="width:70px; height:70px; border-radius:20px; border:2px solid var(--accent);">
                <h2 id="p-name" style="margin:10px 0 5px;">Alexander</h2>
                <div style="font-size:11px; color:var(--accent); font-weight:900;">LVL <span id="p-lvl">1</span> • <span id="p-xp-val">0</span>/1000 XP</div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn btn-secondary active" id="btn-chat-global" onclick="chat.set('global')" style="padding:10px; font-size:11px;">ГЛОБАЛЬНЫЙ</button>
                <button class="btn btn-secondary" id="btn-chat-support" onclick="chat.set('support')" style="padding:10px; font-size:11px;">ПОДДЕРЖКА</button>
            </div>

            <div class="card">
                <div class="chat-wrap" id="chat-render"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chat-input" placeholder="Сообщение..." style="flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:12px; padding:12px; color:white;">
                    <button class="btn btn-primary" style="width:50px; padding:0;" onclick="chat.send()">></button>
                </div>
            </div>
            
            <button class="btn btn-secondary" id="adm-trigger" style="display:none; color:var(--red); margin-top:10px;" onclick="admin.show()">⚙️ АДМИН ПАНЕЛЬ</button>
        </div>

        <div id="scr-game-tower" class="screen">
            <div class="card">
                <div class="tower-grid" id="tower-grid"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <button id="tw-btn-start" class="btn btn-primary" onclick="tower.start()">СТАВКА 10</button>
                    <button id="tw-btn-cash" class="btn btn-primary" style="background:var(--gold); color:#000; display:none;" onclick="tower.cashout()">ЗАБРАТЬ</button>
                </div>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-link active" onclick="ui.nav('lobby')"><i>🏠</i>ГЛАВНАЯ</div>
        <div class="nav-link" onclick="ui.nav('game-tower')"><i>🏰</i>БАШНЯ</div>
        <div class="nav-link" onclick="ui.nav('profile')"><i>👤</i>ПРОФИЛЬ</div>
    </nav>
</div>

<div class="modal" id="adm-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--red);">ADMIN PANEL</h2>
        <button class="btn btn-secondary" style="width:auto; padding:10px;" onclick="admin.hide()">✕</button>
    </div>
    <div class="card">
        <label style="font-size:10px; color:var(--sub-text);">SET BALANCE (TON)</label>
        <input type="number" id="adm-inp-bal" style="width:100%; background:#000; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin:8px 0;">
        <button class="btn btn-primary" onclick="admin.saveBal()">UPDATE</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const state = {
        u: { name: "Player", bal: 150.0, lvl: 1, xp: 250, av: "" },
        chatMode: 'global',
        globalChat: [], // Только игроки
        supportChat: [{u: "Admin", t: "Привет! Есть вопросы?"}],
        tower: { active: false, floor: 0 }
    };

    const ui = {
        nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-'+id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(id === 'lobby') document.querySelectorAll('.nav-link')[0].classList.add('active');
            if(id === 'game-tower') { document.querySelectorAll('.nav-link')[1].classList.add('active'); tower.init(); }
            if(id === 'profile') { document.querySelectorAll('.nav-link')[2].classList.add('active'); chat.render(); }
        },
        sync() {
            document.getElementById('h-bal').innerText = state.u.bal.toFixed(2);
            document.getElementById('h-name').innerText = state.u.name;
            document.getElementById('p-name').innerText = state.u.name;
            document.getElementById('h-lvl').innerText = state.u.lvl;
            document.getElementById('p-lvl').innerText = state.u.lvl;
            
            const nextLvl = state.u.lvl * 1000;
            const progress = (state.u.xp / nextLvl) * 100;
            document.getElementById('h-xp').style.width = progress + '%';
            document.getElementById('p-xp-val').innerText = state.u.xp;
            
            if(state.u.av) {
                document.getElementById('h-av').src = state.u.av;
                document.getElementById('p-av').src = state.u.av;
            }
        }
    };

    const chat = {
        set(m) {
            state.chatMode = m;
            document.getElementById('btn-chat-global').classList.toggle('active', m === 'global');
            document.getElementById('btn-chat-support').classList.toggle('active', m === 'support');
            this.render();
        },
        send() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            const msg = { u: state.u.name, t: inp.value.trim() };
            if(state.chatMode === 'global') state.globalChat.push(msg);
            else state.supportChat.push(msg);
            inp.value = '';
            this.render();
        },
        render() {
            const cont = document.getElementById('chat-render');
            const data = state.chatMode === 'global' ? state.globalChat : state.supportChat;
            cont.innerHTML = data.map(m => `
                <div class="bubble ${m.u === state.u.name ? 'me' : 'other'}">
                    <span class="msg-name">${m.u}</span>
                    ${m.t}
                </div>
            `).join('');
            cont.scrollTop = cont.scrollHeight;
        }
    };

    const tower = {
        init() {
            const g = document.getElementById('tower-grid');
            g.innerHTML = '';
            for(let i=0; i<10; i++) {
                g.innerHTML += `<div class="t-row" id="tw-row-${i}">
                    <div class="t-tile" onclick="tower.step(${i},0)">?</div>
                    <div class="t-tile" onclick="tower.step(${i},1)">?</div>
                    <div class="t-tile" onclick="tower.step(${i},2)">?</div>
                </div>`;
            }
        },
        start() {
            if(state.u.bal < 10) return tg.showAlert("Недостаточно TON");
            state.u.bal -= 10;
            state.tower.active = true;
            state.tower.floor = 0;
            document.getElementById('tw-btn-start').style.display = 'none';
            document.getElementById('tw-btn-cash').style.display = 'block';
            this.draw();
            ui.sync();
        },
        draw() {
            document.querySelectorAll('.t-row').forEach(r => r.classList.remove('active'));
            document.getElementById('tw-row-'+state.tower.floor).classList.add('active');
        },
        step(f, t) {
            if(!state.tower.active || f !== state.tower.floor) return;
            document.getElementById('tw-btn-cash').disabled = true;
            
            const win = Math.random() > 0.45;
            const tiles = document.getElementById('tw-row-'+f).querySelectorAll('.t-tile');
            
            if(win) {
                tiles[t].classList.add('win');
                state.tower.floor++;
                state.u.xp += 50;
                document.getElementById('tw-btn-cash').disabled = false;
                if(state.tower.floor > 9) this.cashout();
                else this.draw();
            } else {
                tiles[t].classList.add('lose');
                state.tower.active = false;
                setTimeout(() => { 
                    this.init(); 
                    document.getElementById('tw-btn-start').style.display='block';
                    document.getElementById('tw-btn-cash').style.display='none';
                }, 800);
            }
            ui.sync();
        },
        cashout() {
            const win = 10 * (state.tower.floor * 1.5);
            state.u.bal += win;
            state.u.xp += 100;
            tg.showAlert(`Победа! +${win.toFixed(2)} TON`);
            state.tower.active = false;
            this.init();
            document.getElementById('tw-btn-start').style.display='block';
            document.getElementById('tw-btn-cash').style.display='none';
            ui.sync();
        }
    };

    const admin = {
        show() { document.getElementById('adm-modal').style.display = 'flex'; },
        hide() { document.getElementById('adm-modal').style.display = 'none'; },
        saveBal() {
            state.u.bal = parseFloat(document.getElementById('adm-inp-bal').value) || 0;
            ui.sync();
            this.hide();
        }
    };

    window.onload = () => {
        tg.ready(); tg.expand();
        if(tg.initDataUnsafe?.user) {
            const user = tg.initDataUnsafe.user;
            state.u.name = user.first_name;
            state.u.av = user.photo_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.id}`;
            if(user.username === 'Kegovich' || user.id === 6418873752) {
                document.getElementById('adm-trigger').style.display = 'block';
            }
        }
        ui.sync();
    };
</script>
</body>
</html>
