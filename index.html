<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Casino</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #1c1c1e;
            --accent-blue: #007aff;
            --text-gray: #8e8e93;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* Колесо */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .center-status {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #1c1c1e 0%, #0b0b0b 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 2px solid #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Список игроков */
        .players-feed {
            width: 90%;
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 180px; /* Место под блок ставок */
            padding: 10px;
        }

        .player-row {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid var(--p-color);
            animation: fadeIn 0.3s ease;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 12px;
            background: #444;
        }

        /* Блок управления ставками */
        .controls-fixed {
            position: fixed;
            bottom: 70px;
            width: 100%;
            background: rgba(11, 11, 11, 0.95);
            padding: 15px 20px;
            box-sizing: border-box;
            border-top: 1px solid #222;
        }

        .total-pool {
            text-align: center;
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .bet-input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2c2e;
            border-radius: 12px;
            padding: 5px 15px;
            margin-bottom: 10px;
        }

        .btn-bet {
            background: linear-gradient(90deg, #0052d4, #4364f7);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Админ панель */
        #admin-btn {
            display: none;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            position: absolute;
            top: 60px;
            left: 20px;
        }

        /* Навигация */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #121212;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }

        .nav-item { color: var(--text-gray); font-size: 11px; text-align: center; text-decoration: none; }
        .nav-item.active { color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="ton-connect-btn"></div>
        <div style="color: var(--accent-blue)" id="user-display">@Guest</div>
    </div>

    <button id="admin-btn" onclick="resetGame()">RESET GAME (ADMIN)</button>

    <div class="wheel-container">
        <canvas id="wheel-canvas" width="600" height="600"></canvas>
        <div class="center-status">
            <span style="font-size: 12px; color: var(--text-gray)">Всего</span>
            <span id="pool-sum" style="font-size: 20px; font-weight: bold;">0</span>
            <span style="font-size: 10px; color: var(--accent-blue)">TON</span>
        </div>
    </div>

    <div class="players-feed" id="players-feed">
        </div>

    <div class="controls-fixed">
        <div class="bet-input-row">
            <button onclick="changeBet(-1)" style="background:none; border:none; color:white; font-size:24px;">-</button>
            <span id="current-bet" style="font-size: 20px; font-weight: bold;">1.00</span>
            <button onclick="changeBet(1)" style="background:none; border:none; color:white; font-size:24px;">+</button>
        </div>
        <button class="btn-bet" onclick="makeBet()">Поставить <span id="bet-btn-val">1.00</span> TON</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item">Кейсы</div>
        <div class="nav-item active">Игры</div>
        <div class="nav-item">Задачи</div>
        <div class="nav-item" onclick="alert('Кошелек подключается сверху!')">Профиль</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQgyNz7P5K4_dlNQsKqniO-kEALW3_OWg",
            authDomain: "casino-213b9.firebaseapp.com",
            databaseURL: "https://casino-213b9-default-rtdb.firebaseio.com",
            projectId: "casino-213b9",
            storageBucket: "casino-213b9.firebasestorage.app",
            messagingSenderId: "104292026196",
            appId: "1:104292026196:web:4b33abbb085143ce69eac1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'active_game');

        // Настройки сессии
        const myUser = "@Kegovich"; // Сюда подставлять из Telegram
        let betAmount = 1.0;

        // Проверка на админа
        if(myUser === "@Kegovich") {
            document.getElementById('admin-btn').style.display = 'block';
        }
        document.getElementById('user-display').innerText = myUser;

        // TON Connect
        const tonConnectUI = new TonConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // Функция отрисовки
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');

        function updateUI(data) {
            const bets = data ? Object.values(data) : [];
            const total = bets.reduce((s, b) => s + b.amount, 0);
            document.getElementById('pool-sum').innerText = total.toFixed(2);

            // Рисуем кольцо
            ctx.clearRect(0, 0, 600, 600);
            if (total === 0) {
                ctx.beginPath(); ctx.arc(300, 300, 270, 0, 2 * Math.PI);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 40; ctx.stroke();
            } else {
                let startAngle = 0;
                bets.forEach(bet => {
                    const slice = (bet.amount / total) * 2 * Math.PI;
                    ctx.beginPath();
                    ctx.arc(300, 300, 270, startAngle, startAngle + slice);
                    ctx.strokeStyle = bet.color;
                    ctx.lineWidth = 40;
                    ctx.stroke();
                    startAngle += slice;
                });
            }

            // Обновляем список игроков
            const feed = document.getElementById('players-feed');
            feed.innerHTML = '';
            bets.reverse().forEach(bet => {
                const div = document.createElement('div');
                div.className = 'player-row';
                div.style.setProperty('--p-color', bet.color);
                div.innerHTML = `
                    <img class="avatar" src="https://ui-avatars.com/api/?name=${bet.user.replace('@','')}&background=random&color=fff">
                    <div style="flex-grow:1">
                        <div style="font-size:14px">${bet.user}</div>
                    </div>
                    <div style="color:#4cd964; font-weight:bold">${bet.amount.toFixed(2)} TON</div>
                `;
                feed.appendChild(div);
            });
        }

        // Слушатель базы
        onValue(gameRef, (snap) => {
            updateUI(snap.val());
        });

        // Действия
        window.changeBet = (v) => {
            betAmount = Math.max(0.1, betAmount + v);
            document.getElementById('current-bet').innerText = betAmount.toFixed(2);
            document.getElementById('bet-btn-val').innerText = betAmount.toFixed(2);
        };

        window.makeBet = async () => {
            if(!tonConnectUI.account) {
                alert("Подключи TON кошелек!");
                return;
            }

            const colors = ['#007aff', '#ff9500', '#4cd964', '#ff3b30', '#af52de', '#ffcc00'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            push(gameRef, {
                user: myUser,
                amount: betAmount,
                color: myUser === "@Kegovich" ? "#007aff" : randomColor,
                time: Date.now()
            });
        };

        window.resetGame = () => {
            set(gameRef, null);
        };
    </script>
</body>
</html>
